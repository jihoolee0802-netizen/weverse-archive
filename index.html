<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weverse Archive</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');

*{box-sizing:border-box;}

body{
margin:0;
padding:24px 16px 120px;
background:#f5f5f7;
font-family:'Pretendard',sans-serif;
color:#111;
}

.container{max-width:560px;margin:auto;}

.feed{display:flex;flex-direction:column;gap:22px;}

.post{
background:white;
border-radius:30px;
padding:24px;
border:1px solid #ececec;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:16px;
}

.left{display:flex;gap:14px;}

.profile{
width:54px;height:54px;border-radius:50%;
overflow:hidden;background:#ddd;flex-shrink:0;
}

.profile img{width:100%;height:100%;object-fit:cover;}

.name-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}

.name{font-size:18px;font-weight:700;}

.date{margin-top:4px;font-size:14px;color:#8e8e93;}

.verify{display:flex;align-items:center;justify-content:center;width:18px;height:18px;}

.content{font-size:18px;line-height:1.8;word-break:keep-all;}

.actions{margin-top:18px;}

.like{border:none;background:none;font-size:30px;cursor:pointer;color:#999;}

.like.active{color:#9EC4E8;}

.reply-wrapper{margin-top:28px;}

.reply-label{font-size:17px;font-weight:700;margin-bottom:18px;}

.reply{margin-left:20px;padding-left:18px;border-left:3px solid #e5e5e5;margin-bottom:26px;}

.open-editor{
position:fixed;bottom:24px;left:50%;
transform:translateX(-50%);
width:calc(100% - 32px);max-width:560px;
border:none;border-radius:22px;
background:#9EC4E8;color:white;
font-size:17px;font-weight:700;
padding:18px;
cursor:pointer;
box-shadow:0 8px 24px rgba(158,196,232,0.35);
z-index:999;
}

.overlay{
position:fixed;inset:0;
background:rgba(0,0,0,0.35);
display:none;justify-content:center;align-items:flex-end;
z-index:1000;
}

.editor{
width:100%;max-width:600px;
background:white;
border-radius:30px 30px 0 0;
padding:26px 20px 40px;
max-height:90vh;
overflow:auto;
}

.editor-title{font-size:25px;font-weight:700;margin-bottom:20px;}

.input{
width:100%;
border:none;
background:#f4f4f5;
border-radius:18px;
padding:16px;
margin-bottom:14px;
font-size:16px;
font-family:'Pretendard',sans-serif;
}

textarea{resize:none;min-height:110px;}

.submit{
width:100%;
border:none;
background:#9EC4E8;
color:white;
border-radius:18px;
padding:16px;
font-size:17px;
font-weight:700;
cursor:pointer;
}

.add-reply-btn{
width:100%;
margin-top:14px;
border:none;
background:#edf5fc;
color:#5f8fbf;
border-radius:16px;
padding:14px;
font-size:15px;
font-weight:700;
cursor:pointer;
}

footer{text-align:center;margin-top:40px;color:#9EC4E8;font-size:15px;}

</style>

</head>

<body>

<div class="container">
<div class="feed" id="feed">로딩중...</div>
</div>

<button class="open-editor" onclick="openTypeSelector()">+ 게시물 추가</button>

<!-- overlays (그대로 유지) -->
<div class="overlay" id="typeOverlay">...</div>
<div class="overlay" id="fanOverlay">...</div>
<div class="overlay" id="artistOverlay">...</div>
<div class="overlay" id="replyOverlay">...</div>

<footer>made with love ♡</footer>

<script type="module">

//////////////////////////////////////////////////
// Firebase
//////////////////////////////////////////////////
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

//////////////////////////////////////////////////
// archive system (방법 A 유지)
//////////////////////////////////////////////////
const params = new URLSearchParams(location.search);
const archiveId = params.get('archive') || 'default';
const DB_PATH = "weverseArchive";

//////////////////////////////////////////////////
// state
//////////////////////////////////////////////////
let posts = [];
let currentReplyIndex = null;

const feed = document.getElementById('feed');

//////////////////////////////////////////////////
// badge (그대로 유지)
//////////////////////////////////////////////////
function verifyBadge(){
return `
<div class="verify">
<svg viewBox="0 0 24 24">
<path fill="#22D3C5" d="M12 2L14.7 4.1L18 3.8L19.1 7L22 9L20.8 12L22 15L19.1 17L18 20.2L14.7 19.9L12 22L9.3 19.9L6 20.2L4.9 17L2 15L3.2 12L2 9L4.9 7L6 3.8L9.3 4.1L12 2Z"/>
<path fill="white" d="M10.2 15.5L6.8 12.1L8 10.9L10.2 13.1L16 7.3L17.2 8.5L10.2 15.5Z"/>
</svg>
</div>`;
}

//////////////////////////////////////////////////
// Firebase load
//////////////////////////////////////////////////
async function loadPosts(){
try{
const ref = doc(db, DB_PATH, archiveId);
const snap = await getDoc(ref);

if(snap.exists()){
posts = snap.data().posts || [];
}else{
posts = [];
}

renderPosts();

}catch(e){
console.error(e);
feed.innerHTML = "데이터 로딩 실패";
}
}

//////////////////////////////////////////////////
// Firebase save
//////////////////////////////////////////////////
async function save(){
const ref = doc(db, DB_PATH, archiveId);

await setDoc(ref,{
posts: posts
});

renderPosts();
closeAll();
}

//////////////////////////////////////////////////
// render
//////////////////////////////////////////////////
function renderPosts(){

feed.innerHTML = '';

if(posts.length === 0){
feed.innerHTML = "<div style='text-align:center;color:#999'>게시물이 없습니다</div>";
return;
}

posts.forEach((post,index)=>{

const card = document.createElement('div');
card.className = 'post';

let html = '';

if(post.type === 'fan'){
html += `
<div class="header">
<div class="left">
<div class="profile"><img src="${post.fanProfile}"></div>
<div>
<div class="name">${post.fanName}</div>
<div class="date">${post.fanTime}</div>
</div>
</div>
</div>

<div class="content">${post.fanContent}</div>

<div class="actions">
<button class="like">♡</button>
</div>

<div class="reply-wrapper">
<div class="reply-label">아티스트 답글</div>
`;

post.replies.forEach(r=> html += renderReply(r));

html += `
<button class="add-reply-btn" onclick="addReplyPrompt(${index})">+ 아티스트 답글 추가</button>
</div>`;
}

if(post.type === 'artist'){
html += `
<div class="header">
<div class="left">
<div class="profile"><img src="${post.artistProfile}"></div>
<div>
<div class="name" style="color:${post.artistColor}">${post.artistName}</div>
<div class="date">${post.artistTime}</div>
</div>
</div>
</div>

<div class="content">${post.artistContent}</div>

<div class="actions">
<button class="like">♡</button>
</div>

<div class="reply-wrapper">
`;

post.replies.forEach(r=> html += renderReply(r));

html += `
<button class="add-reply-btn" onclick="addReplyPrompt(${index})">+ 아티스트 답글 추가</button>
</div>`;
}

card.innerHTML = html;
feed.appendChild(card);
});

document.querySelectorAll('.like').forEach(btn=>{
btn.onclick = function(){
this.classList.toggle('active');
this.textContent = this.classList.contains('active') ? '♥' : '♡';
}
});
}

//////////////////////////////////////////////////
// reply
//////////////////////////////////////////////////
function renderReply(r){
return `
<div class="reply">
<div class="header">
<div class="left">
<div class="profile"><img src="${r.artistProfile}"></div>
<div>
<div class="name" style="color:${r.artistColor}">${r.artistName}</div>
<div class="date">${r.artistTime}</div>
</div>
</div>
</div>
<div class="content">${r.artistReply}</div>
</div>`;
}

//////////////////////////////////////////////////
// open overlays (그대로 유지)
//////////////////////////////////////////////////
window.openTypeSelector=()=>document.getElementById('typeOverlay').style.display='flex';
window.openFanPostEditor=()=>document.getElementById('fanOverlay').style.display='flex';
window.openArtistCommentEditor=()=>document.getElementById('artistOverlay').style.display='flex';

window.addReplyPrompt=(i)=>{
currentReplyIndex=i;
document.getElementById('replyOverlay').style.display='flex';
};

window.closeAll=()=>{
document.querySelectorAll('.overlay').forEach(o=>o.style.display='none');
};

//////////////////////////////////////////////////
// submit functions (핵심 유지)
//////////////////////////////////////////////////
window.addFanPost=()=>{
posts.push({
type:'fan',
fanName:fanName.value,
fanProfile:fanProfile.value,
fanTime:fanTime.value,
fanContent:fanContent.value,
replies:[{
artistName:fanArtistName.value,
artistColor:fanArtistColor.value||'#9EC4E8',
artistProfile:fanArtistProfile.value,
artistTime:fanArtistTime.value,
artistReply:fanArtistReply.value
}]
});
save();
};

window.addArtistComment=()=>{
posts.push({
type:'artist',
artistName:artistName.value,
artistColor:artistColor.value||'#9EC4E8',
artistProfile:artistProfile.value,
artistTime:artistTime.value,
artistContent:artistContent.value,
replies:[]
});
save();
};

window.submitReply=()=>{
posts[currentReplyIndex].replies.push({
artistName:replyArtistName.value,
artistColor:replyArtistColor.value||'#9EC4E8',
artistProfile:replyArtistProfile.value,
artistTime:replyArtistTime.value,
artistReply:replyArtistContent.value
});
save();
};

//////////////////////////////////////////////////
// close overlay click
//////////////////////////////////////////////////
document.querySelectorAll('.overlay').forEach(o=>{
o.addEventListener('click',e=>{
if(e.target===o)o.style.display='none';
});
});

//////////////////////////////////////////////////
// start (중요: 흰 화면 방지)
//////////////////////////////////////////////////
loadPosts();

</script>

</body>
</html>
