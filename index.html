<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weverse Archive</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');

*{box-sizing:border-box;}
body{
margin:0;
padding:24px 16px 120px;
background:#f5f5f7;
font-family:'Pretendard',sans-serif;
color:#111;
}

.container{max-width:560px;margin:auto;}
.feed{display:flex;flex-direction:column;gap:22px;}

.post{
background:white;
border-radius:30px;
padding:24px;
border:1px solid #ececec;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.left{display:flex;gap:14px;}

.profile{
width:54px;height:54px;border-radius:50%;
overflow:hidden;background:#ddd;
}

.profile img{width:100%;height:100%;object-fit:cover;}

.name{font-size:18px;font-weight:700;}
.date{font-size:14px;color:#8e8e93;margin-top:4px;}

.content{font-size:18px;line-height:1.8;word-break:keep-all;}

.like{border:none;background:none;font-size:30px;cursor:pointer;color:#999;}
.like.active{color:#9EC4E8;}

.reply{margin-left:20px;padding-left:18px;border-left:3px solid #e5e5e5;}

.open-editor{
position:fixed;bottom:24px;left:50%;
transform:translateX(-50%);
width:calc(100% - 32px);
max-width:560px;
border:none;
border-radius:22px;
background:#9EC4E8;
color:white;
font-size:17px;
font-weight:700;
padding:18px;
z-index:999;
}

.overlay{
position:fixed;inset:0;
background:rgba(0,0,0,0.35);
display:none;
justify-content:center;
align-items:flex-end;
z-index:1000;
}

.editor{
width:100%;
max-width:600px;
background:white;
border-radius:30px 30px 0 0;
padding:26px 20px 40px;
max-height:90vh;
overflow:auto;
}

.input{
width:100%;
border:none;
background:#f4f4f5;
border-radius:18px;
padding:16px;
margin-bottom:14px;
font-size:16px;
}

.submit{
width:100%;
border:none;
background:#9EC4E8;
color:white;
border-radius:18px;
padding:16px;
font-size:17px;
font-weight:700;
}
</style>

<!-- Firebase CDN -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* =========================
   FIREBASE CONFIG
========================= */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "weverse-archive.firebaseapp.com",
projectId: "weverse-archive",
storageBucket: "weverse-archive.appspot.com",
messagingSenderId: "81825623806",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   ARCHIVE SYSTEM
========================= */
const params = new URLSearchParams(location.search);
const archiveId = params.get("archive") || "default";

const STORAGE_KEY = "weverse_" + archiveId;
const DB_NAME = "weverseArchive";

/* =========================
   STATE
========================= */
let posts = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
const feed = document.getElementById("feed");
let currentReplyIndex = null;

/* =========================
   RENDER
========================= */
function render(){
feed.innerHTML = "";

posts.forEach((p,i)=>{
const div = document.createElement("div");
div.className="post";

div.innerHTML = `
<div class="header">
<div class="left">
<div class="profile">
<img src="${p.fanProfile || p.artistProfile || ''}">
</div>
<div>
<div class="name">${p.fanName || p.artistName}</div>
<div class="date">${p.fanTime || p.artistTime}</div>
</div>
</div>
</div>

<div class="content">${p.fanContent || p.artistContent}</div>

<div class="actions">
<button class="like">♡</button>
</div>
`;

feed.appendChild(div);
});
}

/* =========================
   SAVE (LOCAL + FIREBASE)
========================= */
async function save(){
localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));

await setDoc(doc(db, DB_NAME, archiveId), {
posts
});

render();
}

/* =========================
   LOAD (FIREBASE → LOCAL)
========================= */
async function load(){
const ref = doc(db, DB_NAME, archiveId);
const snap = await getDoc(ref);

if(snap.exists()){
posts = snap.data().posts || [];
localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
}

render();
}

/* =========================
   TEST ADD
========================= */
window.addTest = function(){
posts.push({
type:"artist",
artistName:"TEST",
artistContent:"hello firebase",
artistTime:"now"
});
save();
};

/* =========================
   START
========================= */
load();

window.render = render;
</script>

<body>

<div class="container">
<div class="feed" id="feed"></div>
</div>

<button class="open-editor" onclick="addTest()">
+ 테스트 추가
</button>

</body>
</html>

</body>
</html>
