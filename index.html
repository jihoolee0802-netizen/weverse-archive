<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weverse Archive</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');

*{ box-sizing:border-box; }

body{
margin:0;
padding:24px 16px 120px;
background:#f5f5f7;
font-family:'Pretendard',sans-serif;
color:#111;
}

.container{ max-width:560px; margin:auto; }

.feed{ display:flex; flex-direction:column; gap:22px; }

.post{
background:white;
border-radius:30px;
padding:24px;
border:1px solid #ececec;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.header{ display:flex; justify-content:space-between; }

.left{ display:flex; gap:14px; }

.profile{
width:54px;height:54px;border-radius:50%;
overflow:hidden;background:#ddd;
}

.profile img{ width:100%;height:100%;object-fit:cover; }

.name{ font-size:18px;font-weight:700; }

.date{ font-size:14px;color:#8e8e93; }

.content{ font-size:18px; line-height:1.8; }

.like{ border:none;background:none;font-size:30px;cursor:pointer;color:#999; }
.like.active{ color:#9EC4E8; }

.open-editor{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);
width:calc(100% - 32px);
max-width:560px;
padding:18px;
border:none;
border-radius:22px;
background:#9EC4E8;
color:#fff;
font-size:17px;
font-weight:700;
cursor:pointer;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.35);
display:none;
justify-content:center;
align-items:flex-end;
}

.editor{
width:100%;
background:#fff;
border-radius:30px 30px 0 0;
padding:20px;
}

.input{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
background:#f4f4f5;
border-radius:12px;
}

.submit{
width:100%;
padding:14px;
border:none;
background:#9EC4E8;
color:#fff;
border-radius:12px;
font-weight:700;
}
</style>
</head>

<body>

<div class="container">
<div class="feed" id="feed"></div>
</div>

<button class="open-editor" onclick="openEditor()">+ 게시물 추가</button>

<div class="overlay" id="overlay">
<div class="editor">

<input id="name" class="input" placeholder="이름"/>
<input id="time" class="input" placeholder="시간"/>
<textarea id="content" class="input" placeholder="내용"></textarea>

<button class="submit" onclick="addPost()">저장</button>

</div>
</div>

<script>

const STORAGE_KEY = "weverseArchive_default";

/* 🔥 안전 JSON 로딩 (핵심 수정) */
let posts = [];

try {
  const saved = localStorage.getItem(STORAGE_KEY);
  posts = saved ? JSON.parse(saved) : [];
} catch (e) {
  console.log("저장 데이터 초기화됨");
  posts = [];
}

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
  render();
}

function render(){
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  posts.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div class="header">
        <div class="left">
          <div>
            <div class="name">${p.name}</div>
            <div class="date">${p.time}</div>
          </div>
        </div>
      </div>

      <div class="content">${p.content}</div>

      <button class="like" onclick="toggleLike(this)">♡</button>
    `;

    feed.appendChild(div);
  });
}

function toggleLike(btn){
  btn.classList.toggle("active");
  btn.textContent = btn.classList.contains("active") ? "♥" : "♡";
}

function openEditor(){
  document.getElementById("overlay").style.display = "flex";
}

function addPost(){
  posts.push({
    name: document.getElementById("name").value,
    time: document.getElementById("time").value,
    content: document.getElementById("content").value
  });

  save();
  document.getElementById("overlay").style.display = "none";
}

render();

</script>

</body>
</html>
