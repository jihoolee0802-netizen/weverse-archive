<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weverse Archive</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
padding:24px 16px 120px;
background:#f5f5f7;
font-family:'Pretendard',sans-serif;
color:#111;
}

.container{
max-width:560px;
margin:auto;
}

.feed{
display:flex;
flex-direction:column;
gap:22px;
}

.post{
background:white;
border-radius:30px;
padding:24px;
border:1px solid #ececec;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
overflow:hidden;
}

.header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:16px;
}

.left{
display:flex;
gap:14px;
align-items:flex-start;
}

.profile{
width:54px;
height:54px;
border-radius:50%;
overflow:hidden;
background:#ddd;
flex-shrink:0;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.name-row{
display:flex;
align-items:center;
gap:4px;
flex-wrap:wrap;
}

.name{
font-size:18px;
font-weight:700;
}

.date{
margin-top:4px;
font-size:14px;
color:#8e8e93;
}

.verify{
display:flex;
align-items:center;
justify-content:center;
width:18px;
height:18px;
flex-shrink:0;
}

.verify svg{
width:18px;
height:18px;
display:block;
}

.content{
font-size:18px;
line-height:1.8;
word-break:break-word;
white-space:pre-wrap;
}

.actions{
margin-top:18px;
}

.like{
border:none;
background:none;
font-size:30px;
cursor:pointer;
color:#999;
padding:0;
}

.like.active{
color:#9EC4E8;
}

.reply-wrapper{
margin-top:28px;
}

.reply-label{
font-size:17px;
font-weight:700;
margin-bottom:18px;
}

.reply{
margin-left:20px;
padding-left:18px;
border-left:3px solid #e5e5e5;
margin-bottom:26px;
}

.reply:last-child{
margin-bottom:0;
}

.open-editor{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);

width:calc(100% - 32px);
max-width:560px;

border:none;
border-radius:22px;

background:#9EC4E8;
color:white;

font-size:17px;
font-weight:700;

padding:18px;

cursor:pointer;

box-shadow:
0 8px 24px rgba(158,196,232,0.35);

z-index:999;
}

.overlay{
position:fixed;
inset:0;

background:rgba(0,0,0,0.35);

display:none;
justify-content:center;
align-items:flex-end;

z-index:1000;
}

.editor{
width:100%;
max-width:600px;

background:white;

border-radius:30px 30px 0 0;

padding:26px 20px 40px;

max-height:90vh;
overflow:auto;
}

.editor-title{
font-size:25px;
font-weight:700;
margin-bottom:20px;
}

.input{
width:100%;
border:none;
outline:none;
background:#f4f4f5;

border-radius:18px;

padding:16px;
margin-bottom:14px;

font-size:16px;
font-family:'Pretendard',sans-serif;
}

textarea{
resize:none;
min-height:110px;
}

.submit{
width:100%;
border:none;

background:#9EC4E8;
color:white;

border-radius:18px;

padding:16px;

font-size:17px;
font-weight:700;

cursor:pointer;
}

.add-reply-btn{
width:100%;
margin-top:18px;

border:none;
background:#edf5fc;

color:#5f8fbf;

border-radius:16px;

padding:14px;

font-size:15px;
font-weight:700;

cursor:pointer;
}

footer{
text-align:center;
margin-top:40px;
color:#9EC4E8;
font-size:15px;
}

</style>

</head>

<body>

<div class="container">

<div class="feed" id="feed"></div>

</div>

<button
class="open-editor"
onclick="openTypeSelector()"
>
+ 게시물 추가
</button>

<!-- 타입 선택 -->

<div class="overlay" id="typeOverlay">

<div class="editor">

<div class="editor-title">
무엇을 추가할까?
</div>

<button
class="submit"
onclick="openFanPostEditor()"
style="margin-bottom:12px;"
>
팬 답글
</button>

<button
class="submit"
onclick="openArtistCommentEditor()"
>
아티스트 댓글
</button>

</div>

</div>

<!-- 팬 답글 -->

<div class="overlay" id="fanOverlay">

<div class="editor">

<div class="editor-title">
팬 답글 생성
</div>

<input
class="input"
id="fanName"
placeholder="팬 이름 / 팬덤명"
/>

<input
class="input"
id="fanProfile"
placeholder="팬 프로필 사진 URL"
/>

<input
class="input"
id="fanTime"
placeholder="팬 작성 시간"
/>

<textarea
class="input"
id="fanContent"
placeholder="팬 질문 입력"
></textarea>

<hr style="margin:24px 0;border:none;border-top:1px solid #eee;">

<div style="font-weight:700;margin-bottom:14px;">
아티스트 답글
</div>

<input
class="input"
id="fanArtistName"
placeholder="아티스트 이름"
/>

<input
class="input"
id="fanArtistColor"
placeholder="아티스트 이름 색상 (#9EC4E8)"
/>

<input
class="input"
id="fanArtistProfile"
placeholder="아티스트 사진 URL"
/>

<input
class="input"
id="fanArtistTime"
placeholder="아티스트 작성 시간"
/>

<textarea
class="input"
id="fanArtistReply"
placeholder="아티스트 답글 입력"
></textarea>

<button
class="submit"
onclick="addFanPost()"
>
저장하기
</button>

</div>

</div>

<!-- 아티스트 댓글 -->

<div class="overlay" id="artistOverlay">

<div class="editor">

<div class="editor-title">
아티스트 댓글 생성
</div>

<input
class="input"
id="artistName"
placeholder="아티스트 이름"
/>

<input
class="input"
id="artistColor"
placeholder="아티스트 이름 색상 (#9EC4E8)"
/>

<input
class="input"
id="artistProfile"
placeholder="아티스트 사진 URL"
/>

<input
class="input"
id="artistTime"
placeholder="작성 시간"
/>

<textarea
class="input"
id="artistContent"
placeholder="아티스트 댓글 입력"
></textarea>

<button
class="submit"
onclick="addArtistComment()"
>
저장하기
</button>

</div>

</div>

<!-- 답글 추가 -->

<div class="overlay" id="replyOverlay">

<div class="editor">

<div class="editor-title">
아티스트 답글 추가
</div>

<input
class="input"
id="replyArtistName"
placeholder="아티스트 이름"
/>

<input
class="input"
id="replyArtistColor"
placeholder="아티스트 이름 색상"
/>

<input
class="input"
id="replyArtistProfile"
placeholder="아티스트 사진 URL"
/>

<input
class="input"
id="replyArtistTime"
placeholder="작성 시간"
/>

<textarea
class="input"
id="replyArtistContent"
placeholder="답글 입력"
></textarea>

<button
class="submit"
onclick="submitReply()"
>
답글 저장
</button>

</div>

</div>

<footer>
made with love ♡
</footer>

<script>

//////////////////////////////////////////////////
// Firebase
//////////////////////////////////////////////////

const firebaseConfig = {
apiKey: "AIzaSyCScxIFC1-FtX7a9JNFMoNB9yAyhBoneLo",
authDomain: "weverse-archive.firebaseapp.com",
projectId: "weverse-archive",
storageBucket: "weverse-archive.firebasestorage.app",
messagingSenderId: "81825623806",
appId: "1:81825623806:web:4a815e85600f0f9de13faf",
measurementId: "G-GX6RB28S7D"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

//////////////////////////////////////////////////
// archive 분리
//////////////////////////////////////////////////

const params =
new URLSearchParams(location.search);

const archiveId =
params.get('archive') || 'default';

//////////////////////////////////////////////////
// data
//////////////////////////////////////////////////

let posts = [];

let currentReplyId = null;

const feed =
document.getElementById('feed');

//////////////////////////////////////////////////
// 인증마크
//////////////////////////////////////////////////

function verifyBadge(){

return `

<div class="verify">

<svg
viewBox="0 0 24 24"
xmlns="http://www.w3.org/2000/svg"
>

<path
fill="#22D3C5"
d="M12 2L14.7 4.1L18 3.8L19.1 7L22 9L20.8 12L22 15L19.1 17L18 20.2L14.7 19.9L12 22L9.3 19.9L6 20.2L4.9 17L2 15L3.2 12L2 9L4.9 7L6 3.8L9.3 4.1L12 2Z"
/>

<path
fill="white"
d="M10.2 15.5L6.8 12.1L8 10.9L10.2 13.1L16 7.3L17.2 8.5L10.2 15.5Z"
/>

</svg>

</div>

`;

}

//////////////////////////////////////////////////
// render
//////////////////////////////////////////////////

function renderPosts(){

feed.innerHTML = '';

posts.forEach((post)=>{

const card =
document.createElement('div');

card.className = 'post';

let html = '';

//////////////////////////////////////////////////
// 팬 게시물
//////////////////////////////////////////////////

if(post.type === 'fan'){

html += `

<div class="header">

<div class="left">

<div class="profile">
<img src="${post.fanProfile || ''}">
</div>

<div>

<div class="name">
${post.fanName || ''}
</div>

<div class="date">
${post.fanTime || ''}
</div>

</div>

</div>

</div>

<div class="content">
${post.fanContent || ''}
</div>

<div class="actions">
<button class="like">♡</button>
</div>

<div class="reply-wrapper">

<div class="reply-label">
아티스트 답글
</div>

`;

(post.replies || []).forEach(reply=>{

html += renderReply(reply);

});

html += `

<button
class="add-reply-btn"
onclick="addReplyPrompt('${post.id}')"
>
+ 아티스트 답글 추가
</button>

</div>

`;

}

//////////////////////////////////////////////////
// 아티스트 게시물
//////////////////////////////////////////////////

if(post.type === 'artist'){

html += `

<div class="header">

<div class="left">

<div class="profile">
<img src="${post.artistProfile || ''}">
</div>

<div>

<div class="name-row">

<div
class="name"
style="color:${post.artistColor || '#9EC4E8'}"
>
${post.artistName || ''}
</div>

${verifyBadge()}

</div>

<div class="date">
${post.artistTime || ''}
</div>

</div>

</div>

</div>

<div class="content">
${post.artistContent || ''}
</div>

<div class="actions">
<button class="like">♡</button>
</div>

<div class="reply-wrapper">

${(post.replies || []).length > 0
? '<div class="reply-label">아티스트 답글</div>'
: ''}

`;

(post.replies || []).forEach(reply=>{

html += renderReply(reply);

});

html += `

<button
class="add-reply-btn"
onclick="addReplyPrompt('${post.id}')"
>
+ 아티스트 답글 추가
</button>

</div>

`;

}

card.innerHTML = html;

feed.appendChild(card);

});

//////////////////////////////////////////////////
// 좋아요
//////////////////////////////////////////////////

document
.querySelectorAll('.like')
.forEach(btn=>{

btn.onclick = function(){

this.classList.toggle('active');

this.textContent =
this.classList.contains('active')
? '♥'
: '♡';

}

});

}

//////////////////////////////////////////////////
// 답글 렌더
//////////////////////////////////////////////////

function renderReply(reply){

return `

<div class="reply">

<div class="header">

<div class="left">

<div class="profile">
<img src="${reply.artistProfile || ''}">
</div>

<div>

<div class="name-row">

<div
class="name"
style="color:${reply.artistColor || '#9EC4E8'}"
>
${reply.artistName || ''}
</div>

${verifyBadge()}

</div>

<div class="date">
${reply.artistTime || ''}
</div>

</div>

</div>

</div>

<div class="content">
${reply.artistReply || ''}
</div>

<div class="actions">
<button class="like">♡</button>
</div>

</div>

`;

}

//////////////////////////////////////////////////
// overlay open
//////////////////////////////////////////////////

function openTypeSelector(){

closeAll();

document.getElementById('typeOverlay')
.style.display = 'flex';

}

function openFanPostEditor(){

closeAll();

document.getElementById('fanOverlay')
.style.display = 'flex';

}

function openArtistCommentEditor(){

closeAll();

document.getElementById('artistOverlay')
.style.display = 'flex';

}

function addReplyPrompt(id){

currentReplyId = id;

closeAll();

document.getElementById('replyOverlay')
.style.display = 'flex';

}

//////////////////////////////////////////////////
// overlay close
//////////////////////////////////////////////////

function closeAll(){

document.querySelectorAll('.overlay')
.forEach(overlay=>{

overlay.style.display = 'none';

});

}

document.querySelectorAll('.overlay')
.forEach(overlay=>{

overlay.addEventListener('click',(e)=>{

if(e.target === overlay){
overlay.style.display = 'none';
}

});

});

//////////////////////////////////////////////////
// Firestore realtime
//////////////////////////////////////////////////

db.collection("archives")
.doc(archiveId)
.collection("posts")
.orderBy("createdAt","desc")
.onSnapshot(snapshot=>{

posts = snapshot.docs.map(doc=>({

id: doc.id,
...doc.data()

}));

renderPosts();

});

//////////////////////////////////////////////////
// 팬 게시물 추가
//////////////////////////////////////////////////

async function addFanPost(){

await db
.collection("archives")
.doc(archiveId)
.collection("posts")
.add({

type:'fan',

fanName:
document.getElementById('fanName').value,

fanProfile:
document.getElementById('fanProfile').value,

fanTime:
document.getElementById('fanTime').value,

fanContent:
document.getElementById('fanContent').value,

replies:[

{

artistName:
document.getElementById('fanArtistName').value,

artistColor:
document.getElementById('fanArtistColor').value
|| '#9EC4E8',

artistProfile:
document.getElementById('fanArtistProfile').value,

artistTime:
document.getElementById('fanArtistTime').value,

artistReply:
document.getElementById('fanArtistReply').value

}

],

createdAt: Date.now()

});

closeAll();

}

//////////////////////////////////////////////////
// 아티스트 게시물 추가
//////////////////////////////////////////////////

async function addArtistComment(){

await db
.collection("archives")
.doc(archiveId)
.collection("posts")
.add({

type:'artist',

artistName:
document.getElementById('artistName').value,

artistColor:
document.getElementById('artistColor').value
|| '#9EC4E8',

artistProfile:
document.getElementById('artistProfile').value,

artistTime:
document.getElementById('artistTime').value,

artistContent:
document.getElementById('artistContent').value,

replies:[],

createdAt: Date.now()

});

closeAll();

}

//////////////////////////////////////////////////
// 답글 추가
//////////////////////////////////////////////////

async function submitReply(){

const docRef =
db.collection("archives")
.doc(archiveId)
.collection("posts")
.doc(currentReplyId);

const docSnap =
await docRef.get();

const data = docSnap.data();

const replies =
data.replies || [];

replies.push({

artistName:
document.getElementById('replyArtistName').value,

artistColor:
document.getElementById('replyArtistColor').value
|| '#9EC4E8',

artistProfile:
document.getElementById('replyArtistProfile').value,

artistTime:
document.getElementById('replyArtistTime').value,

artistReply:
document.getElementById('replyArtistContent').value

});

await docRef.update({

replies: replies

});

closeAll();

}

</script>

</body>
</html>
