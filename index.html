<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weverse Archive</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');

*{box-sizing:border-box;}
body{
margin:0;
padding:24px 16px 120px;
background:#f5f5f7;
font-family:'Pretendard',sans-serif;
}

.container{max-width:560px;margin:auto;}
.feed{display:flex;flex-direction:column;gap:22px;}

.post{
background:white;
border-radius:30px;
padding:24px;
border:1px solid #ececec;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:16px;
}

.left{display:flex;gap:14px;}

.profile{
width:54px;height:54px;border-radius:50%;
overflow:hidden;background:#ddd;
}

.profile img{width:100%;height:100%;object-fit:cover;}

.name-row{
display:flex;
align-items:center;
gap:6px;
flex-wrap:wrap;
}

.name{font-size:18px;font-weight:700;}

.date{font-size:14px;color:#8e8e93;margin-top:4px;}

.verify{
display:inline-flex;
align-items:center;
justify-content:center;
width:18px;height:18px;
}

.content{font-size:18px;line-height:1.8;}

.like{border:none;background:none;font-size:30px;color:#999;cursor:pointer;}
.like.active{color:#9EC4E8;}

.reply-wrapper{margin-top:28px;}

.reply{
margin-left:20px;
padding-left:18px;
border-left:3px solid #e5e5e5;
margin-bottom:20px;
}

.open-editor{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);
width:calc(100% - 32px);
max-width:560px;
padding:18px;
border:none;
border-radius:22px;
background:#9EC4E8;
color:white;
font-weight:700;
font-size:17px;
z-index:999;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.35);
display:none;
align-items:flex-end;
justify-content:center;
}

.editor{
background:white;
width:100%;
max-width:600px;
border-radius:30px 30px 0 0;
padding:26px;
max-height:90vh;
overflow:auto;
}

.input{
width:100%;
padding:14px;
border:none;
background:#f4f4f5;
border-radius:14px;
margin-bottom:10px;
}

.submit{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#9EC4E8;
color:white;
font-weight:700;
}

.reply-btn{
margin-top:10px;
background:#edf5fc;
color:#5f8fbf;
border:none;
padding:12px;
width:100%;
border-radius:14px;
font-weight:700;
}

.reply-btn.done{
display:none;
}
</style>

</head>

<body>

<div class="container">
<div class="feed" id="feed"></div>
</div>

<button class="open-editor" onclick="openType()">+ 게시물 추가</button>

<!-- TYPE -->
<div class="overlay" id="typeOverlay">
<div class="editor">
<button class="submit" onclick="openFan()">팬 답글</button>
<br><br>
<button class="submit" onclick="openArtist()">아티스트 댓글</button>
</div>
</div>

<!-- FAN -->
<div class="overlay" id="fanOverlay">
<div class="editor">
<input id="fanName" class="input" placeholder="팬 이름"/>
<input id="fanProfile" class="input" placeholder="프로필"/>
<input id="fanTime" class="input" placeholder="시간"/>
<textarea id="fanContent" class="input" placeholder="내용"></textarea>

<hr>

<input id="fanArtistName" class="input" placeholder="아티스트 이름"/>
<input id="fanArtistColor" class="input" placeholder="색상 #HEX"/>
<input id="fanArtistProfile" class="input" placeholder="프로필"/>
<input id="fanArtistTime" class="input" placeholder="시간"/>
<textarea id="fanArtistReply" class="input" placeholder="답글"></textarea>

<button class="submit" onclick="addFan()">저장</button>
</div>
</div>

<!-- ARTIST -->
<div class="overlay" id="artistOverlay">
<div class="editor">
<input id="artistName" class="input" placeholder="아티스트 이름"/>
<input id="artistColor" class="input" placeholder="색상"/>
<input id="artistProfile" class="input" placeholder="프로필"/>
<input id="artistTime" class="input" placeholder="시간"/>
<textarea id="artistContent" class="input" placeholder="내용"></textarea>

<button class="submit" onclick="addArtist()">저장</button>
</div>
</div>

<!-- REPLY -->
<div class="overlay" id="replyOverlay">
<div class="editor">
<input id="rName" class="input" placeholder="이름"/>
<input id="rColor" class="input" placeholder="색상"/>
<input id="rProfile" class="input" placeholder="프로필"/>
<input id="rTime" class="input" placeholder="시간"/>
<textarea id="rText" class="input" placeholder="답글"></textarea>

<button class="submit" onclick="addReply()">저장</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getFirestore,
collection,
doc,
getDoc,
setDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCScxIFC1-FtX7a9JNFMoNB9yAyhBoneLo",
authDomain: "weverse-archive.firebaseapp.com",
projectId: "weverse-archive",
storageBucket: "weverse-archive.appspot.com",
messagingSenderId: "81825623806",
appId: "1:81825623806:web:4a815e85600f0f9de13faf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const archiveId = new URLSearchParams(location.search).get("archive") || "default";
const ref = doc(db, "archives", archiveId);

let posts = [];
let replyIndex = null;

const feed = document.getElementById("feed");

/* realtime load */
onSnapshot(ref, (snap)=>{
posts = snap.exists() ? snap.data().posts || [] : [];
render();
});

/* save */
async function save(){
await setDoc(ref, {posts});
}

/* verify icon */
function verify(){
return `<span class="verify">
<svg viewBox="0 0 24 24">
<path fill="#22D3C5" d="M12 2L14.7 4.1L18 3.8L19.1 7L22 9L20.8 12L22 15L19.1 17L18 20.2L14.7 19.9L12 22L9.3 19.9L6 20.2L4.9 17L2 15L3.2 12L2 9L4.9 7L6 3.8L9.3 4.1L12 2Z"/>
</svg></span>`;
}

/* render */
function render(){
feed.innerHTML = "";

posts.forEach((p,i)=>{

let html = "";

if(p.type==="fan"){
html += `
<div class="post">
<div class="header">
<div class="left">
<div class="profile"><img src="${p.fanProfile}"></div>
<div>
<div class="name">${p.fanName}</div>
<div class="date">${p.fanTime}</div>
</div>
</div>
</div>

<div class="content">${p.fanContent}</div>

<div class="reply-wrapper">
<div style="font-weight:700">아티스트 답글</div>
${p.replies.map(renderReply).join("")}
<button class="reply-btn ${p.done?'done':''}" onclick="openReply(${i})">
+ 아티스트 답글 추가
</button>
</div>
</div>`;
}

if(p.type==="artist"){
html += `
<div class="post">
<div class="header">
<div class="left">
<div class="profile"><img src="${p.artistProfile}"></div>
<div>
<div class="name-row">
<div class="name" style="color:${p.artistColor}">${p.artistName}</div>
${verify()}
</div>
<div class="date">${p.artistTime}</div>
</div>
</div>
</div>

<div class="content">${p.artistContent}</div>
</div>`;
}

feed.innerHTML += html;
});
}

/* reply */
function renderReply(r){
return `
<div class="reply">
<div class="name-row">
<div class="name" style="color:${r.artistColor}">${r.artistName}</div>
${verify()}
</div>
<div class="date">${r.artistTime}</div>
<div>${r.artistReply}</div>
</div>`;
}

/* overlays */
function openType(){document.getElementById("typeOverlay").style.display="flex";}
function openFan(){document.getElementById("fanOverlay").style.display="flex";}
function openArtist(){document.getElementById("artistOverlay").style.display="flex";}

window.openType=openType;
window.openFan=openFan;
window.openArtist=openArtist;

/* add */
async function addFan(){
posts.push({
type:"fan",
fanName:fanName.value,
fanProfile:fanProfile.value,
fanTime:fanTime.value,
fanContent:fanContent.value,
replies:[{
artistName:fanArtistName.value,
artistColor:fanArtistColor.value,
artistProfile:fanArtistProfile.value,
artistTime:fanArtistTime.value,
artistReply:fanArtistReply.value
}],
done:false
});
await save();
}

async function addArtist(){
posts.push({
type:"artist",
artistName:artistName.value,
artistColor:artistColor.value,
artistProfile:artistProfile.value,
artistTime:artistTime.value,
artistContent:artistContent.value,
replies:[]
});
await save();
}

function openReply(i){
replyIndex=i;
document.getElementById("replyOverlay").style.display="flex";
}

async function addReply(){
posts[replyIndex].replies.push({
artistName:rName.value,
artistColor:rColor.value,
artistProfile:rProfile.value,
artistTime:rTime.value,
artistReply:rText.value
});
await save();
}

window.addFan=addFan;
window.addArtist=addArtist;
window.addReply=addReply;
window.openReply=openReply;

render();

</script>

</body>
</html>
