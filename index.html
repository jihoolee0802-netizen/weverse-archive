<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weverse Archive</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');

*{box-sizing:border-box;}

body{
margin:0;
padding:24px 16px 120px;
background:#f5f5f7;
font-family:'Pretendard',sans-serif;
color:#111;
}

.container{max-width:560px;margin:auto;}

.feed{display:flex;flex-direction:column;gap:22px;}

.post{
background:#fff;
border-radius:30px;
padding:24px;
border:1px solid #ececec;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:16px;
}

.left{display:flex;gap:14px;}

.profile{
width:54px;height:54px;border-radius:50%;
overflow:hidden;background:#ddd;flex-shrink:0;
}

.profile img{width:100%;height:100%;object-fit:cover;}

.name-row{
display:flex;
align-items:center;
gap:6px;
flex-wrap:wrap;
}

.name{font-size:18px;font-weight:700;}

.date{font-size:14px;color:#8e8e93;margin-top:4px;}

.verify{
display:inline-flex;
align-items:center;
justify-content:center;
width:18px;height:18px;
}

.verify svg{width:18px;height:18px;}

.content{
font-size:18px;
line-height:1.8;
word-break:keep-all;
}

.like{
border:none;background:none;
font-size:28px;cursor:pointer;color:#999;
}

.like.active{color:#9EC4E8;}

.reply-wrapper{margin-top:24px;}

.reply{
margin-left:20px;
padding-left:16px;
border-left:3px solid #e5e5e5;
margin-bottom:18px;
}

.add-reply-btn{
width:100%;
margin-top:10px;
border:none;
background:#edf5fc;
color:#5f8fbf;
border-radius:14px;
padding:12px;
font-weight:700;
cursor:pointer;
}

.open-editor{
position:fixed;
bottom:24px;left:50%;
transform:translateX(-50%);
width:calc(100% - 32px);
max-width:560px;
border:none;
border-radius:22px;
background:#9EC4E8;
color:#fff;
font-size:17px;
font-weight:700;
padding:18px;
z-index:999;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.35);
display:none;
justify-content:center;
align-items:flex-end;
z-index:1000;
}

.editor{
width:100%;
max-width:600px;
background:#fff;
border-radius:30px 30px 0 0;
padding:26px 20px 40px;
max-height:90vh;
overflow:auto;
}

.editor-title{font-size:22px;font-weight:700;margin-bottom:16px;}

.input{
width:100%;
border:none;
background:#f4f4f5;
border-radius:16px;
padding:14px;
margin-bottom:10px;
font-size:15px;
}

textarea{min-height:100px;resize:none;}

.submit{
width:100%;
border:none;
background:#9EC4E8;
color:#fff;
border-radius:16px;
padding:14px;
font-weight:700;
cursor:pointer;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<div class="feed" id="feed"></div>
</div>

<button class="open-editor" onclick="openType()">+ 게시물 추가</button>

<!-- TYPE -->
<div class="overlay" id="typeOverlay">
<div class="editor">
<div class="editor-title">추가 선택</div>
<button class="submit" onclick="openFan()">팬 답글</button>
<button class="submit" onclick="openArtist()">아티스트 댓글</button>
</div>
</div>

<!-- FAN -->
<div class="overlay" id="fanOverlay">
<div class="editor">
<div class="editor-title">팬 답글</div>

<input class="input" id="fanName" placeholder="팬 이름"/>
<input class="input" id="fanProfile" placeholder="프로필 URL"/>
<input class="input" id="fanTime" placeholder="작성 시간 (직접 입력)"/>
<textarea class="input" id="fanContent" placeholder="내용"></textarea>

<hr/>

<div class="editor-title">아티스트 답글 (기본 1개)</div>

<input class="input" id="fanAName" placeholder="아티스트 이름"/>
<input class="input" id="fanAColor" placeholder="#색상코드"/>
<input class="input" id="fanAProfile" placeholder="사진 URL"/>
<input class="input" id="fanATime" placeholder="작성 시간"/>
<textarea class="input" id="fanAContent" placeholder="답글 내용"></textarea>

<button class="submit" onclick="addFan()">저장</button>
</div>
</div>

<!-- ARTIST -->
<div class="overlay" id="artistOverlay">
<div class="editor">
<div class="editor-title">아티스트 댓글</div>

<input class="input" id="aName" placeholder="아티스트 이름"/>
<input class="input" id="aColor" placeholder="#색상코드"/>
<input class="input" id="aProfile" placeholder="사진 URL"/>
<input class="input" id="aTime" placeholder="작성 시간"/>
<textarea class="input" id="aContent" placeholder="내용"></textarea>

<button class="submit" onclick="addArtist()">저장</button>
</div>
</div>

<footer style="text-align:center;margin-top:40px;color:#9EC4E8;">
made with love ♡
</footer>

<script>

/* =========================
   SAFE INIT (화이트스크린 방지)
========================= */

let posts = [];
let currentReply = null;

const params = new URLSearchParams(location.search);
const archiveId = params.get("archive") || "default";
const KEY = "weverse_" + archiveId;

const feed = document.getElementById("feed");

/* =========================
   VERIFY BADGE (핵심 수정: inline-flex)
========================= */
function badge(){
return `
<span class="verify">
<svg viewBox="0 0 24 24">
<path fill="#22D3C5" d="M12 2L14.7 4.1L18 3.8L19.1 7L22 9L20.8 12L22 15L19.1 17L18 20.2L14.7 19.9L12 22L9.3 19.9L6 20.2L4.9 17L2 15L3.2 12L2 9L4.9 7L6 3.8L9.3 4.1L12 2Z"/>
<path fill="#fff" d="M10.2 15.5L6.8 12.1L8 10.9L10.2 13.1L16 7.3L17.2 8.5L10.2 15.5Z"/>
</svg>
</span>`;
}

/* =========================
   LOAD (localStorage first = 안정)
========================= */
function load(){
try{
posts = JSON.parse(localStorage.getItem(KEY)) || [];
}catch(e){
posts = [];
}
render();
}
load();

/* =========================
   SAVE (localStorage + fallback safe)
========================= */
function save(){
try{
localStorage.setItem(KEY, JSON.stringify(posts));
}catch(e){
console.log("save fail",e);
}
render();
}

/* =========================
   RENDER SAFE
========================= */
function render(){
feed.innerHTML = "";

posts.forEach((p,i)=>{

let html = "";

if(p.type==="fan"){
html += `
<div class="post">
<div class="header">
<div class="left">
<div class="profile"><img src="${p.fanProfile||''}"/></div>
<div>
<div class="name">${p.fanName||''}</div>
<div class="date">${p.fanTime||''}</div>
</div>
</div>
</div>

<div class="content">${p.fanContent||''}</div>

<div class="reply-wrapper">
<div class="add-reply-btn">아티스트 답글</div>
`;

(p.replies||[]).forEach(r=>{
html += `
<div class="reply">
<div class="name-row">
<div class="name" style="color:${r.artistColor||'#9EC4E8'}">${r.artistName||''}</div>
${badge()}
</div>
<div class="date">${r.artistTime||''}</div>
<div class="content">${r.artistReply||''}</div>
</div>`;
});

html += `
<button class="add-reply-btn" onclick="addReply(${i})">+ 아티스트 답글 추가</button>
</div>
</div>`;
}

if(p.type==="artist"){
html += `
<div class="post">
<div class="header">
<div class="left">
<div class="profile"><img src="${p.artistProfile||''}"/></div>
<div>
<div class="name-row">
<div class="name" style="color:${p.artistColor||'#9EC4E8'}">${p.artistName||''}</div>
${badge()}
</div>
<div class="date">${p.artistTime||''}</div>
</div>
</div>
</div>

<div class="content">${p.artistContent||''}</div>
</div>`;
}

feed.innerHTML += html;
});
}

/* =========================
   REPLY SYSTEM FIX (핵심)
========================= */
function addReply(index){
const name = prompt("아티스트 이름");
const color = prompt("색상 코드 (#xxxxxx)");
const profile = prompt("프로필 URL");
const time = prompt("시간");
const content = prompt("답글");

posts[index].replies = posts[index].replies || [];

posts[index].replies.push({
artistName:name,
artistColor:color,
artistProfile:profile,
artistTime:time,
artistReply:content
});

save();
}

/* =========================
   ADD POSTS
========================= */
function addFan(){
posts.push({
type:"fan",
fanName:fanName.value,
fanProfile:fanProfile.value,
fanTime:fanTime.value,
fanContent:fanContent.value,
replies:[{
artistName:fanAName.value,
artistColor:fanAColor.value||"#9EC4E8",
artistProfile:fanAProfile.value,
artistTime:fanATime.value,
artistReply:fanAContent.value
}]
});
save();
closeAll();
}

function addArtist(){
posts.push({
type:"artist",
artistName:aName.value,
artistColor:aColor.value||"#9EC4E8",
artistProfile:aProfile.value,
artistTime:aTime.value,
artistContent:aContent.value,
replies:[]
});
save();
closeAll();
}

/* =========================
   UI CONTROL
========================= */
function openType(){closeAll();typeOverlay.style.display="flex";}
function openFan(){closeAll();fanOverlay.style.display="flex";}
function openArtist(){closeAll();artistOverlay.style.display="flex";}
function closeAll(){
document.querySelectorAll(".overlay").forEach(o=>o.style.display="none");
}
document.querySelectorAll(".overlay").forEach(o=>{
o.addEventListener("click",e=>{
if(e.target===o) closeAll();
});
});

</script>
</body>
</html>
