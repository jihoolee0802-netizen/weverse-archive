<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8" />
<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>Weverse Archive</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html{
-webkit-text-size-adjust:100%;
}

body{
margin:0;
padding:24px 16px 120px;
background:#f5f5f7;
font-family:'Pretendard',sans-serif;
color:#111;
}

button,
input,
textarea{
font-family:'Pretendard',sans-serif;
}

.container{
max-width:560px;
margin:auto;
}

.feed{
display:flex;
flex-direction:column;
gap:22px;
}

.post{
background:white;
border-radius:30px;
padding:24px;
border:1px solid #ececec;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:16px;
}

.left{
display:flex;
gap:14px;
width:100%;
}

.profile{
width:54px;
height:54px;
border-radius:50%;
overflow:hidden;
background:#ddd;
flex-shrink:0;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.name-row{
display:flex;
align-items:center;
gap:4px;
flex-wrap:wrap;
}

.name{
font-size:18px;
font-weight:700;
}

.date{
margin-top:4px;
font-size:14px;
color:#8e8e93;
}

.verify{
display:flex;
align-items:center;
justify-content:center;
width:18px;
height:18px;
}

.verify svg{
width:18px;
height:18px;
}

.content{
font-size:18px;
line-height:1.8;
word-break:break-word;
white-space:pre-wrap;
}

.actions{
margin-top:18px;
}

.like{
border:none;
background:none;
font-size:30px;
cursor:pointer;
color:#999;
padding:0;
}

.like.active{
color:#9EC4E8;
}

.reply-wrapper{
margin-top:28px;
}

.reply-label{
font-size:17px;
font-weight:700;
margin-bottom:18px;
}

.reply{
margin-left:20px;
padding-left:18px;
border-left:3px solid #e5e5e5;
margin-bottom:26px;
}

.open-editor{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);

width:calc(100% - 32px);
max-width:560px;

border:none;
border-radius:22px;

background:#9EC4E8;
color:white;

font-size:17px;
font-weight:700;

padding:18px;

cursor:pointer;

box-shadow:
0 8px 24px rgba(158,196,232,0.35);

z-index:999;
}

.overlay{
position:fixed;
inset:0;

background:rgba(0,0,0,0.35);

display:none;
justify-content:center;
align-items:flex-end;

z-index:1000;
}

.editor{
width:100%;
max-width:600px;

background:white;

border-radius:30px 30px 0 0;

padding:26px 20px 40px;

max-height:90vh;
overflow:auto;

-webkit-overflow-scrolling:touch;
}

.editor-title{
font-size:25px;
font-weight:700;
margin-bottom:20px;
}

.input{
width:100%;
border:none;
outline:none;
background:#f4f4f5;

border-radius:18px;

padding:16px;
margin-bottom:14px;

font-size:16px;
}

textarea{
resize:none;
min-height:110px;
}

.submit{
width:100%;
border:none;

background:#9EC4E8;
color:white;

border-radius:18px;

padding:16px;

font-size:17px;
font-weight:700;

cursor:pointer;
}

.add-reply-btn{
width:100%;
margin-top:14px;

border:none;
background:#edf5fc;

color:#5f8fbf;

border-radius:16px;

padding:14px;

font-size:15px;
font-weight:700;

cursor:pointer;
}

.loading{
text-align:center;
padding:40px 20px;
color:#8e8e93;
font-size:15px;
}

.empty{
text-align:center;
padding:60px 20px;
color:#8e8e93;
font-size:16px;
}

footer{
text-align:center;
margin-top:40px;
color:#9EC4E8;
font-size:15px;
}

</style>

</head>

<body>

<div class="container">

<div class="feed" id="feed">

<div class="loading">
불러오는 중...
</div>

</div>

</div>

<button
class="open-editor"
onclick="openTypeSelector()"
>
+ 게시물 추가
</button>

<!-- 타입 선택 -->

<div class="overlay" id="typeOverlay">

<div class="editor">

<div class="editor-title">
무엇을 추가할까?
</div>

<button
class="submit"
onclick="openFanPostEditor()"
style="margin-bottom:12px;"
>
팬 답글
</button>

<button
class="submit"
onclick="openArtistCommentEditor()"
>
아티스트 댓글
</button>

</div>

</div>

<!-- 팬 답글 -->

<div class="overlay" id="fanOverlay">

<div class="editor">

<div class="editor-title">
팬 답글 생성
</div>

<input
class="input"
id="fanName"
placeholder="팬 이름 / 팬덤명"
/>

<input
class="input"
id="fanProfile"
placeholder="팬 프로필 사진 URL"
/>

<input
class="input"
id="fanTime"
placeholder="팬 작성 시간"
/>

<textarea
class="input"
id="fanContent"
placeholder="팬 질문 입력"
></textarea>

<hr style="margin:24px 0;border:none;border-top:1px solid #eee;">

<div style="font-weight:700;margin-bottom:14px;">
아티스트 답글
</div>

<input
class="input"
id="fanArtistName"
placeholder="아티스트 이름"
/>

<input
class="input"
id="fanArtistColor"
placeholder="아티스트 이름 색상 (#9EC4E8)"
/>

<input
class="input"
id="fanArtistProfile"
placeholder="아티스트 사진 URL"
/>

<input
class="input"
id="fanArtistTime"
placeholder="아티스트 작성 시간"
/>

<textarea
class="input"
id="fanArtistReply"
placeholder="아티스트 답글 입력"
></textarea>

<button
class="submit"
onclick="addFanPost()"
>
저장하기
</button>

</div>

</div>

<!-- 아티스트 댓글 -->

<div class="overlay" id="artistOverlay">

<div class="editor">

<div class="editor-title">
아티스트 댓글 생성
</div>

<input
class="input"
id="artistName"
placeholder="아티스트 이름"
/>

<input
class="input"
id="artistColor"
placeholder="아티스트 이름 색상 (#9EC4E8)"
/>

<input
class="input"
id="artistProfile"
placeholder="아티스트 사진 URL"
/>

<input
class="input"
id="artistTime"
placeholder="작성 시간"
/>

<textarea
class="input"
id="artistContent"
placeholder="아티스트 댓글 입력"
></textarea>

<button
class="submit"
onclick="addArtistComment()"
>
저장하기
</button>

</div>

</div>

<!-- 답글 추가 -->

<div class="overlay" id="replyOverlay">

<div class="editor">

<div class="editor-title">
아티스트 답글 추가
</div>

<input
class="input"
id="replyArtistName"
placeholder="아티스트 이름"
/>

<input
class="input"
id="replyArtistColor"
placeholder="아티스트 이름 색상"
/>

<input
class="input"
id="replyArtistProfile"
placeholder="아티스트 사진 URL"
/>

<input
class="input"
id="replyArtistTime"
placeholder="작성 시간"
/>

<textarea
class="input"
id="replyArtistContent"
placeholder="답글 입력"
></textarea>

<button
class="submit"
onclick="submitReply()"
>
답글 저장
</button>

</div>

</div>

<footer>
made with love ♡
</footer>

<script type="module">

//////////////////////////////////////////////////
// Firebase
//////////////////////////////////////////////////

import { initializeApp }
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

import {
getFirestore,
doc,
getDoc,
setDoc
}
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

//////////////////////////////////////////////////
// firebase config
//////////////////////////////////////////////////

const firebaseConfig = {

apiKey:
"AIzaSyCScxIFC1-FtX7a9JNFMoNB9yAyhBoneLo",

authDomain:
"weverse-archive.firebaseapp.com",

projectId:
"weverse-archive",

storageBucket:
"weverse-archive.firebasestorage.app",

messagingSenderId:
"81825623806",

appId:
"1:81825623806:web:4a815e85600f0f9de13faf",

measurementId:
"G-GX6RB28S7D"

};

//////////////////////////////////////////////////
// init
//////////////////////////////////////////////////

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

//////////////////////////////////////////////////
// archive 분리
//////////////////////////////////////////////////

const params =
new URLSearchParams(location.search);

const archiveId =
params.get('archive') || 'default';

const DOC_ID =
archiveId;

//////////////////////////////////////////////////
// local fallback
//////////////////////////////////////////////////

const LOCAL_KEY =
'weverseArchiveBackup_' + archiveId;

//////////////////////////////////////////////////
// data
//////////////////////////////////////////////////

let posts = [];

let currentReplyIndex = null;

const feed =
document.getElementById('feed');

//////////////////////////////////////////////////
// verify badge
//////////////////////////////////////////////////

function verifyBadge(){

return `

<div class="verify">

<svg
viewBox="0 0 24 24"
xmlns="http://www.w3.org/2000/svg"
>

<path
fill="#22D3C5"
d="M12 2L14.7 4.1L18 3.8L19.1 7L22 9L20.8 12L22 15L19.1 17L18 20.2L14.7 19.9L12 22L9.3 19.9L6 20.2L4.9 17L2 15L3.2 12L2 9L4.9 7L6 3.8L9.3 4.1L12 2Z"
/>

<path
fill="white"
d="M10.2 15.5L6.8 12.1L8 10.9L10.2 13.1L16 7.3L17.2 8.5L10.2 15.5Z"
/>

</svg>

</div>

`;

}

//////////////////////////////////////////////////
// safe image
//////////////////////////////////////////////////

function safeImage(url){

if(!url){
return 'https://placehold.co/200x200';
}

return url;

}

//////////////////////////////////////////////////
// render reply
//////////////////////////////////////////////////

function renderReply(reply){

return `

<div class="reply">

<div class="header">

<div class="left">

<div class="profile">
<img
src="${safeImage(reply.artistProfile)}"
loading="lazy"
onerror="this.src='https://placehold.co/200x200'"
>
</div>

<div>

<div class="name-row">

<div
class="name"
style="color:${reply.artistColor || '#9EC4E8'}"
>
${reply.artistName || ''}
</div>

${verifyBadge()}

</div>

<div class="date">
${reply.artistTime || ''}
</div>

</div>

</div>

</div>

<div class="content">
${reply.artistReply || ''}
</div>

<div class="actions">
<button class="like">♡</button>
</div>

</div>

`;

}

//////////////////////////////////////////////////
// render
//////////////////////////////////////////////////

function renderPosts(){

feed.innerHTML = '';

if(posts.length === 0){

feed.innerHTML = `

<div class="empty">
아직 게시물이 없어요 ✨
</div>

`;

return;

}

posts.forEach((post,index)=>{

const card =
document.createElement('div');

card.className = 'post';

let html = '';

//////////////////////////////////////////////////
// fan
//////////////////////////////////////////////////

if(post.type === 'fan'){

html += `

<div class="header">

<div class="left">

<div class="profile">
<img
src="${safeImage(post.fanProfile)}"
loading="lazy"
onerror="this.src='https://placehold.co/200x200'"
>
</div>

<div>

<div class="name">
${post.fanName || ''}
</div>

<div class="date">
${post.fanTime || ''}
</div>

</div>

</div>

</div>

<div class="content">
${post.fanContent || ''}
</div>

<div class="actions">
<button class="like">♡</button>
</div>

<div class="reply-wrapper">

<div class="reply-label">
아티스트 답글
</div>

`;

(post.replies || []).forEach(reply=>{

html += renderReply(reply);

});

html += `

<button
class="add-reply-btn"
onclick="addReplyPrompt(${index})"
>
+ 아티스트 답글 추가
</button>

</div>

`;

}

//////////////////////////////////////////////////
// artist
//////////////////////////////////////////////////

if(post.type === 'artist'){

html += `

<div class="header">

<div class="left">

<div class="profile">
<img
src="${safeImage(post.artistProfile)}"
loading="lazy"
onerror="this.src='https://placehold.co/200x200'"
>
</div>

<div>

<div class="name-row">

<div
class="name"
style="color:${post.artistColor || '#9EC4E8'}"
>
${post.artistName || ''}
</div>

${verifyBadge()}

</div>

<div class="date">
${post.artistTime || ''}
</div>

</div>

</div>

</div>

<div class="content">
${post.artistContent || ''}
</div>

<div class="actions">
<button class="like">♡</button>
</div>

<div class="reply-wrapper">

${post.replies?.length
? '<div class="reply-label">아티스트 답글</div>'
: ''}

`;

(post.replies || []).forEach(reply=>{

html += renderReply(reply);

});

html += `

<button
class="add-reply-btn"
onclick="addReplyPrompt(${index})"
>
+ 아티스트 답글 추가
</button>

</div>

`;

}

card.innerHTML = html;

feed.appendChild(card);

});

//////////////////////////////////////////////////
// like
//////////////////////////////////////////////////

document
.querySelectorAll('.like')
.forEach(btn=>{

btn.onclick = function(){

this.classList.toggle('active');

this.textContent =
this.classList.contains('active')
? '♥'
: '♡';

};

});

}

//////////////////////////////////////////////////
// firebase save
//////////////////////////////////////////////////

async function savePosts(){

try{

await setDoc(

doc(db,'archives',DOC_ID),

{
posts:posts,
updatedAt:Date.now()
}

);

localStorage.setItem(
LOCAL_KEY,
JSON.stringify(posts)
);

renderPosts();

closeAll();

}
catch(error){

console.error(error);

localStorage.setItem(
LOCAL_KEY,
JSON.stringify(posts)
);

renderPosts();

closeAll();

alert(
'인터넷 연결 문제로 로컬에만 저장되었어요.'
);

}

}

//////////////////////////////////////////////////
// firebase load
//////////////////////////////////////////////////

async function loadPosts(){

try{

const snapshot =
await getDoc(
doc(db,'archives',DOC_ID)
);

if(snapshot.exists()){

posts =
snapshot.data().posts || [];

localStorage.setItem(
LOCAL_KEY,
JSON.stringify(posts)
);

}
else{

const backup =
localStorage.getItem(LOCAL_KEY);

posts =
backup
? JSON.parse(backup)
: [];

}

}
catch(error){

console.error(error);

const backup =
localStorage.getItem(LOCAL_KEY);

posts =
backup
? JSON.parse(backup)
: [];

}

renderPosts();

}

//////////////////////////////////////////////////
// open
//////////////////////////////////////////////////

window.openTypeSelector = function(){

closeAll();

document.getElementById('typeOverlay')
.style.display = 'flex';

};

window.openFanPostEditor = function(){

closeAll();

document.getElementById('fanOverlay')
.style.display = 'flex';

};

window.openArtistCommentEditor = function(){

closeAll();

document.getElementById('artistOverlay')
.style.display = 'flex';

};

window.addReplyPrompt = function(index){

currentReplyIndex = index;

closeAll();

document.getElementById('replyOverlay')
.style.display = 'flex';

};

//////////////////////////////////////////////////
// close
//////////////////////////////////////////////////

function closeAll(){

document.querySelectorAll('.overlay')
.forEach(overlay=>{

overlay.style.display = 'none';

});

}

document.querySelectorAll('.overlay')
.forEach(overlay=>{

overlay.addEventListener('click',(e)=>{

if(e.target === overlay){

overlay.style.display = 'none';

}

});

});

//////////////////////////////////////////////////
// add fan
//////////////////////////////////////////////////

window.addFanPost = async function(){

posts.unshift({

type:'fan',

fanName:
document.getElementById('fanName').value,

fanProfile:
document.getElementById('fanProfile').value,

fanTime:
document.getElementById('fanTime').value,

fanContent:
document.getElementById('fanContent').value,

replies:[

{

artistName:
document.getElementById('fanArtistName').value,

artistColor:
document.getElementById('fanArtistColor').value
|| '#9EC4E8',

artistProfile:
document.getElementById('fanArtistProfile').value,

artistTime:
document.getElementById('fanArtistTime').value,

artistReply:
document.getElementById('fanArtistReply').value

}

]

});

await savePosts();

};

//////////////////////////////////////////////////
// add artist
//////////////////////////////////////////////////

window.addArtistComment = async function(){

posts.unshift({

type:'artist',

artistName:
document.getElementById('artistName').value,

artistColor:
document.getElementById('artistColor').value
|| '#9EC4E8',

artistProfile:
document.getElementById('artistProfile').value,

artistTime:
document.getElementById('artistTime').value,

artistContent:
document.getElementById('artistContent').value,

replies:[]

});

await savePosts();

};

//////////////////////////////////////////////////
// add reply
//////////////////////////////////////////////////

window.submitReply = async function(){

posts[currentReplyIndex]
.replies.push({

artistName:
document.getElementById('replyArtistName').value,

artistColor:
document.getElementById('replyArtistColor').value
|| '#9EC4E8',

artistProfile:
document.getElementById('replyArtistProfile').value,

artistTime:
document.getElementById('replyArtistTime').value,

artistReply:
document.getElementById('replyArtistContent').value

});

await savePosts();

};

//////////////////////////////////////////////////
// start
//////////////////////////////////////////////////

loadPosts();

</script>

</body>
</html>
