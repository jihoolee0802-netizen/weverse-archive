<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weverse Archive Final</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');

* {
box-sizing: border-box;
}

body {
margin: 0;
padding: 24px 16px 120px;
background: #f5f5f7;
font-family: 'Pretendard', sans-serif;
color: #111;
}

.container {
max-width: 560px;
margin: auto;
}

.feed {
display: flex;
flex-direction: column;
gap: 22px;
}

.post {
background: white;
border-radius: 30px;
padding: 24px;
border: 1px solid #ececec;
box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

.header {
display: flex;
justify-content: space-between;
align-items: flex-start;
margin-bottom: 16px;
}

.left {
display: flex;
gap: 14px;
}

.profile {
width: 54px;
height: 54px;
border-radius: 50%;
overflow: hidden;
background: #ddd;
flex-shrink: 0;
}

.profile img {
width: 100%;
height: 100%;
object-fit: cover;
}

.name-row {
display: flex;
align-items: center;
gap: 4px;
flex-wrap: wrap;
}

.name {
font-size: 18px;
font-weight: 700;
}

.date {
margin-top: 4px;
font-size: 14px;
color: #8e8e93;
}

.verify {
display: flex;
align-items: center;
justify-content: center;
width: 18px;
height: 18px;
}

.verify svg {
width: 18px;
height: 18px;
}

.content {
font-size: 18px;
line-height: 1.8;
word-break: keep-all;
}

.actions {
margin-top: 18px;
}

.like {
border: none;
background: none;
font-size: 30px;
cursor: pointer;
color: #999;
}

.like.active {
color: #9EC4E8;
}

.reply-wrapper {
margin-top: 28px;
}

.reply-label {
font-size: 17px;
font-weight: 700;
margin-bottom: 18px;
}

.reply {
margin-left: 20px;
padding-left: 18px;
border-left: 3px solid #e5e5e5;
margin-bottom: 26px;
}

.open-editor {
position: fixed;
bottom: 24px;
left: 50%;
transform: translateX(-50%);
width: calc(100% - 32px);
max-width: 560px;
border: none;
border-radius: 22px;
background: #9EC4E8;
color: white;
font-size: 17px;
font-weight: 700;
padding: 18px;
cursor: pointer;
box-shadow: 0 8px 24px rgba(158,196,232,0.35);
z-index: 999;
}

.overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.35);
display: none;
justify-content: center;
align-items: flex-end;
z-index: 1000;
}

.editor {
width: 100%;
max-width: 600px;
background: white;
border-radius: 30px 30px 0 0;
padding: 26px 20px 40px;
max-height: 90vh;
overflow: auto;
}

.editor-title {
font-size: 25px;
font-weight: 700;
margin-bottom: 20px;
}

.input {
width: 100%;
border: none;
background: #f4f4f5;
border-radius: 18px;
padding: 16px;
margin-bottom: 14px;
font-size: 16px;
font-family: 'Pretendard', sans-serif;
}

textarea {
resize: none;
min-height: 110px;
}

.submit {
width: 100%;
border: none;
background: #9EC4E8;
color: white;
border-radius: 18px;
padding: 16px;
font-size: 17px;
font-weight: 700;
cursor: pointer;
}

.add-reply-btn {
width: 100%;
margin-top: 14px;
border: none;
background: #edf5fc;
color: #5f8fbf;
border-radius: 16px;
padding: 14px;
font-size: 15px;
font-weight: 700;
cursor: pointer;
}

footer {
text-align: center;
margin-top: 40px;
color: #9EC4E8;
font-size: 15px;
}
body{
margin:0;
padding:24px;
font-family:sans-serif;
background:#f5f5f7;
}

.container{max-width:560px;margin:auto;}
.post{background:#fff;padding:16px;margin-bottom:12px;border-radius:16px;}
button{padding:10px 14px;border-radius:10px;border:none;background:#9EC4E8;color:white;}
</style>

</head>

<body>

<div class="container">
  <div id="feed"></div>
</div>

<button onclick="addTestPost()">+ 테스트 추가</button>

<!-- ================= FIREBASE ================= -->

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";

import { 
getFirestore,
doc,
getDoc,
setDoc
} 
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

console.log("🚀 START");

const firebaseConfig = {
apiKey: "AIzaSyCScxIFC1-FtX7a9JNFMoNB9yAyhBoneLo",
authDomain: "weverse-archive.firebaseapp.com",
projectId: "weverse-archive",
storageBucket: "weverse-archive.appspot.com",
messagingSenderId: "81825623806",
appId: "1:81825623806:web:4a815e85600f0f9de13faf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const DB = "weverseArchive";
const DOC_ID = "main";

let posts = []; // ⭐ 핵심 (절대 null 금지)

const feed = document.getElementById("feed");


// ================= LOAD =================
async function load(){

try{

const ref = doc(db, DB, DOC_ID);
const snap = await getDoc(ref);

if(snap.exists()){
posts = snap.data().posts || [];
}else{
posts = [];
}

console.log("LOAD OK", posts);

render();

}catch(e){
console.error("LOAD ERROR", e);
posts = [];
render();
}

}


// ================= SAVE =================
async function save(){

try{

const ref = doc(db, DB, DOC_ID);

await setDoc(ref,{
posts: posts
});

console.log("SAVE OK");

}catch(e){
console.error("SAVE ERROR", e);
}

}


// ================= RENDER =================
function render(){

if(!posts) return;

feed.innerHTML = "";

posts.forEach((p,i)=>{

const div = document.createElement("div");
div.className = "post";

div.innerHTML = `
  <div>📌 Post ${i+1}</div>
  <div>${p.text}</div>
`;

feed.appendChild(div);

});

}


// ================= ADD POST =================
window.addTestPost = function(){

if(!posts) posts = [];

posts.push({
text:"hello weverse " + new Date().toLocaleTimeString()
});

save();
render();

}


// ================= START =================
load();

</script>

</body>
</html>
