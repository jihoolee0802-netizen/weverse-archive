<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCScxIFC1-FtX7a9JNFMoNB9yAyhBoneLo",
  authDomain: "weverse-archive.firebaseapp.com",
  projectId: "weverse-archive",
  storageBucket: "weverse-archive.firebasestorage.app",
  messagingSenderId: "81825623806",
  appId: "1:81825623806:web:4a815e85600f0f9de13faf",
  measurementId: "G-GX6RB28S7D"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   ARCHIVE ID
========================= */
const params = new URLSearchParams(location.search);
const archiveId = params.get("archive") || "default";

/* Firestore 문서 */
const ref = doc(db, "archives", archiveId);

/* =========================
   DATA
========================= */
let posts = [];
let currentReplyIndex = null;

const feed = document.getElementById("feed");

/* =========================
   LOAD (핵심: 초기화 방지)
========================= */
async function load(){
  const snap = await getDoc(ref);

  if(snap.exists()){
    posts = snap.data().posts || [];
  } else {
    posts = [];
  }

  render();
}

/* =========================
   SAVE (핵심 저장 구조)
========================= */
async function save(){
  await setDoc(ref, {
    posts: posts
  });

  render();
}

/* =========================
   인증마크 (가로 고정)
========================= */
function verifyBadge(){
return `
<span class="verify">
<svg viewBox="0 0 24 24">
<path fill="#22D3C5" d="M12 2L14.7 4.1L18 3.8L19.1 7L22 9L20.8 12L22 15L19.1 17L18 20.2L14.7 19.9L12 22L9.3 19.9L6 20.2L4.9 17L2 15L3.2 12L2 9L4.9 7L6 3.8L9.3 4.1L12 2Z"/>
<path fill="#fff" d="M10.2 15.5L6.8 12.1L8 10.9L10.2 13.1L16 7.3L17.2 8.5L10.2 15.5Z"/>
</svg>
</span>`;
}

/* =========================
   RENDER
========================= */
function render(){
  feed.innerHTML = "";

  posts.forEach((p,i)=>{
    let html = "";

    if(p.type === "fan"){
      html += `
      <div class="post">

        <div class="header">
          <div class="left">
            <div class="profile"><img src="${p.fanProfile}"></div>
            <div>
              <div class="name">${p.fanName}</div>
              <div class="date">${p.fanTime}</div>
            </div>
          </div>
        </div>

        <div class="content">${p.fanContent}</div>

        <div class="reply-wrapper">
          <div class="reply-label">아티스트 답글</div>
      `;

      p.replies.forEach(r=>{
        html += `
        <div class="reply">
          <div class="name-row">
            <div class="name" style="color:${r.artistColor}">
              ${r.artistName}
            </div>
            ${verifyBadge()}
          </div>
          <div class="date">${r.artistTime}</div>
          <div class="content">${r.artistReply}</div>
        </div>`;
      });

      html += `
        <button class="add-reply-btn" onclick="openReply(${i})">
          + 아티스트 답글 추가
        </button>
        </div>
      </div>`;
    }

    if(p.type === "artist"){
      html += `
      <div class="post">

        <div class="header">
          <div class="left">
            <div class="profile"><img src="${p.artistProfile}"></div>

            <div>
              <div class="name-row">
                <div class="name" style="color:${p.artistColor}">
                  ${p.artistName}
                </div>
                ${verifyBadge()}
              </div>
              <div class="date">${p.artistTime}</div>
            </div>
          </div>
        </div>

        <div class="content">${p.artistContent}</div>
      </div>`;
    }

    feed.innerHTML += html;
  });
}

   ADD FUNCTIONS
========================= */

/* =========================
   REPLY ADD
========================= */
function openReply(i){
  const name = prompt("아티스트 이름");
  const color = prompt("색상 코드 (#xxxxxx)");
  const time = prompt("시간");
  const text = prompt("답글");

  posts[i].replies.push({
    artistName:name,
    artistColor:color,
    artistTime:time,
    artistReply:text
  });

  save();
}

/* =========================
   START
========================= */
load();

</script>
