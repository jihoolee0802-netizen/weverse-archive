<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weverse Debug</title>
</head>

<body>

<h2>Firebase Debug Test</h2>
<div id="status">Loading...</div>
<div id="feed"></div>

<script type="module">

console.log("🚀 SCRIPT START");

document.getElementById("status").innerText = "SCRIPT STARTED";

//////////////////////////////////////////////////
// Firebase import
//////////////////////////////////////////////////
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

console.log("📦 FIREBASE IMPORT LOADED");

//////////////////////////////////////////////////
// Firebase config (여기 반드시 수정)
//////////////////////////////////////////////////
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID"
};

//////////////////////////////////////////////////
// init
//////////////////////////////////////////////////
let app, db;

try {
app = initializeApp(firebaseConfig);
console.log("🔥 APP CREATED:", app);

db = getFirestore(app);
console.log("🧠 DB CREATED:", db);

document.getElementById("status").innerText = "Firebase initialized";

} catch (e) {
console.error("❌ INIT ERROR:", e);
document.getElementById("status").innerText = "INIT ERROR";
}

//////////////////////////////////////////////////
// test firestore
//////////////////////////////////////////////////
async function testFirestore(){

try {
console.log("📡 TRY FIRESTORE READ");

const ref = doc(db, "testCollection", "testDoc");
const snap = await getDoc(ref);

console.log("📄 SNAPSHOT:", snap.exists());

document.getElementById("feed").innerText =
snap.exists()
? "DATA EXISTS"
: "NO DATA (but connection works)";

} catch (e) {
console.error("❌ FIRESTORE ERROR:", e);
document.getElementById("feed").innerText =
"FIRESTORE ERROR: " + e.message;
}

}

//////////////////////////////////////////////////
// run test
//////////////////////////////////////////////////

setTimeout(() => {
console.log("⏱ START TEST");
testFirestore();
}, 1500);

</script>

</body>
</html>
