<script type="module">
//////////////////////////////////////////////////
// Firebase (GitHub Pages용 CDN 방식)
//////////////////////////////////////////////////

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCScxIFC1-FtX7a9JNFMoNB9yAyhBoneLo",
  authDomain: "weverse-archive.firebaseapp.com",
  projectId: "weverse-archive",
  storageBucket: "weverse-archive.firebasestorage.app",
  messagingSenderId: "81825623806",
  appId: "1:81825623806:web:4a815e85600f0f9de13faf",
  measurementId: "G-GX6RB28S7D"
};

let app, db;

try {
  app = initializeApp(firebaseConfig);
  db = getFirestore(app);
} catch (e) {
  console.error("Firebase init failed:", e);
}

//////////////////////////////////////////////////
// archive id
//////////////////////////////////////////////////

const params = new URLSearchParams(location.search);
const archiveId = params.get("archive") || "default";

//////////////////////////////////////////////////
// state
//////////////////////////////////////////////////

let posts = [];
let currentReplyIndex = null;

const feed = document.getElementById("feed");

//////////////////////////////////////////////////
// Firestore load (안 죽게 처리)
//////////////////////////////////////////////////

try {
  const q = query(
    collection(db, "archives", archiveId, "posts"),
    orderBy("createdAt", "asc")
  );

  onSnapshot(q, (snapshot) => {
    posts = snapshot.docs.map(d => ({
      id: d.id,
      ...d.data()
    }));
    renderPosts();
  }, (err) => {
    console.error("Firestore error:", err);
    posts = [];
    renderPosts();
  });

} catch (e) {
  console.error("onSnapshot failed:", e);
}

//////////////////////////////////////////////////
// verify badge (원본 유지)
//////////////////////////////////////////////////

function verifyBadge() {
  return `
  <div class="verify">
    <svg viewBox="0 0 24 24">
      <path fill="#22D3C5"
        d="M12 2L14.7 4.1L18 3.8L19.1 7L22 9L20.8 12L22 15L19.1 17L18 20.2L14.7 19.9L12 22L9.3 19.9L6 20.2L4.9 17L2 15L3.2 12L2 9L4.9 7L6 3.8L9.3 4.1L12 2Z"/>
      <path fill="white"
        d="M10.2 15.5L6.8 12.1L8 10.9L10.2 13.1L16 7.3L17.2 8.5L10.2 15.5Z"/>
    </svg>
  </div>`;
}

//////////////////////////////////////////////////
// render (원본 구조 유지 + 안전화)
//////////////////////////////////////////////////

function renderPosts() {
  if (!feed) return;

  feed.innerHTML = "";

  posts.forEach((post, index) => {
    const card = document.createElement("div");
    card.className = "post";

    let html = "";

    try {

      if (post.type === "fan") {
        html += `
        <div class="header">
          <div class="left">
            <div class="profile">
              <img src="${post.fanProfile || ""}">
            </div>
            <div>
              <div class="name">${post.fanName || ""}</div>
              <div class="date">${post.fanTime || ""}</div>
            </div>
          </div>
        </div>

        <div class="content">${post.fanContent || ""}</div>

        <div class="actions">
          <button class="like">♡</button>
        </div>

        <div class="reply-wrapper">
          <div class="reply-label">아티스트 답글</div>
        `;

        (post.replies || []).forEach(r => {
          html += renderReply(r);
        });

        html += `
          <button class="add-reply-btn" onclick="addReplyPrompt(${index})">
            + 아티스트 답글 추가
          </button>
        </div>`;
      }

      if (post.type === "artist") {
        html += `
        <div class="header">
          <div class="left">
            <div class="profile">
              <img src="${post.artistProfile || ""}">
            </div>
            <div>
              <div class="name-row">
                <div class="name" style="color:${post.artistColor || "#9EC4E8"}">
                  ${post.artistName || ""}
                </div>
                ${verifyBadge()}
              </div>
              <div class="date">${post.artistTime || ""}</div>
            </div>
          </div>
        </div>

        <div class="content">${post.artistContent || ""}</div>

        <div class="actions">
          <button class="like">♡</button>
        </div>

        <div class="reply-wrapper">
          ${post.replies?.length ? '<div class="reply-label">아티스트 답글</div>' : ""}
        `;

        (post.replies || []).forEach(r => {
          html += renderReply(r);
        });

        html += `
          <button class="add-reply-btn" onclick="addReplyPrompt(${index})">
            + 아티스트 답글 추가
          </button>
        </div>`;
      }

      card.innerHTML = html;
      feed.appendChild(card);

    } catch (e) {
      console.error("render crash:", e);
    }
  });

  document.querySelectorAll(".like").forEach(btn => {
    btn.onclick = function () {
      this.classList.toggle("active");
      this.textContent = this.classList.contains("active") ? "♥" : "♡";
    };
  });
}

//////////////////////////////////////////////////
// reply
//////////////////////////////////////////////////

function renderReply(r) {
  return `
  <div class="reply">
    <div class="header">
      <div class="left">
        <div class="profile">
          <img src="${r.artistProfile || ""}">
        </div>
        <div>
          <div class="name-row">
            <div class="name" style="color:${r.artistColor || "#9EC4E8"}">
              ${r.artistName || ""}
            </div>
            ${verifyBadge()}
          </div>
          <div class="date">${r.artistTime || ""}</div>
        </div>
      </div>
    </div>

    <div class="content">${r.artistReply || ""}</div>

    <div class="actions">
      <button class="like">♡</button>
    </div>
  </div>`;
}

//////////////////////////////////////////////////
// open (window 안전)
//////////////////////////////////////////////////

window.openTypeSelector = () => {
  closeAll();
  document.getElementById("typeOverlay").style.display = "flex";
};

window.openFanPostEditor = () => {
  closeAll();
  document.getElementById("fanOverlay").style.display = "flex";
};

window.openArtistCommentEditor = () => {
  closeAll();
  document.getElementById("artistOverlay").style.display = "flex";
};

window.addReplyPrompt = (i) => {
  currentReplyIndex = i;
  closeAll();
  document.getElementById("replyOverlay").style.display = "flex";
};

function closeAll() {
  document.querySelectorAll(".overlay").forEach(o => o.style.display = "none");
}

//////////////////////////////////////////////////
// SAVE (Firestore)
//////////////////////////////////////////////////

async function savePost(data) {
  try {
    await addDoc(collection(db, "archives", archiveId, "posts"), {
      ...data,
      createdAt: serverTimestamp()
    });
  } catch (e) {
    console.error("save failed:", e);
    alert("저장 실패");
  }
}

//////////////////////////////////////////////////
// add functions (원본 유지)
//////////////////////////////////////////////////

window.addFanPost = async () => {
  await savePost({
    type: "fan",
    fanName: document.getElementById("fanName")?.value || "",
    fanProfile: document.getElementById("fanProfile")?.value || "",
    fanTime: document.getElementById("fanTime")?.value || "",
    fanContent: document.getElementById("fanContent")?.value || "",
    replies: [{
      artistName: document.getElementById("fanArtistName")?.value || "",
      artistColor: document.getElementById("fanArtistColor")?.value || "#9EC4E8",
      artistProfile: document.getElementById("fanArtistProfile")?.value || "",
      artistTime: document.getElementById("fanArtistTime")?.value || "",
      artistReply: document.getElementById("fanArtistReply")?.value || ""
    }]
  });

  closeAll();
};

window.addArtistComment = async () => {
  await savePost({
    type: "artist",
    artistName: document.getElementById("artistName")?.value || "",
    artistColor: document.getElementById("artistColor")?.value || "#9EC4E8",
    artistProfile: document.getElementById("artistProfile")?.value || "",
    artistTime: document.getElementById("artistTime")?.value || "",
    artistContent: document.getElementById("artistContent")?.value || "",
    replies: []
  });

  closeAll();
};

window.submitReply = async () => {
  const post = posts[currentReplyIndex];
  if (!post) return;

  await savePost({
    ...post,
    replies: [
      ...(post.replies || []),
      {
        artistName: document.getElementById("replyArtistName")?.value || "",
        artistColor: document.getElementById("replyArtistColor")?.value || "#9EC4E8",
        artistProfile: document.getElementById("replyArtistProfile")?.value || "",
        artistTime: document.getElementById("replyArtistTime")?.value || "",
        artistReply: document.getElementById("replyArtistContent")?.value || ""
      }
    ]
  });

  closeAll();
};

//////////////////////////////////////////////////
// start
//////////////////////////////////////////////////

renderPosts();
</script>
