<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weverse Archive</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');

*{box-sizing:border-box;}

body{
margin:0;
padding:24px 16px 120px;
background:#f5f5f7;
font-family:'Pretendard',sans-serif;
color:#111;
}

.container{max-width:560px;margin:auto;}

.feed{
display:flex;
flex-direction:column;
gap:22px;
}

.post{
background:#fff;
border-radius:30px;
padding:24px;
border:1px solid #ececec;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:16px;
}

.left{display:flex;gap:14px;}

.profile{
width:54px;height:54px;
border-radius:50%;
overflow:hidden;
background:#ddd;
flex-shrink:0;
}

.profile img{width:100%;height:100%;object-fit:cover;}

.name-row{
display:flex;
align-items:center;
gap:6px;
flex-wrap:nowrap;
}

.name{font-size:18px;font-weight:700;}

.date{font-size:14px;color:#8e8e93;margin-top:4px;}

.verify{
display:inline-flex;
align-items:center;
justify-content:center;
width:18px;height:18px;
flex-shrink:0;
}

.content{
font-size:18px;
line-height:1.8;
word-break:keep-all;
}

.like{
border:none;
background:none;
font-size:30px;
cursor:pointer;
color:#999;
}

.like.active{color:#9EC4E8;}

.reply{
margin-left:20px;
padding-left:18px;
border-left:3px solid #e5e5e5;
margin-bottom:20px;
}

.open-editor{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);
width:calc(100% - 32px);
max-width:560px;
border:none;
border-radius:22px;
background:#9EC4E8;
color:#fff;
font-size:17px;
font-weight:700;
padding:18px;
cursor:pointer;
box-shadow:0 8px 24px rgba(158,196,232,0.35);
z-index:999;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.35);
display:none;
justify-content:center;
align-items:flex-end;
z-index:1000;
}

.editor{
width:100%;
max-width:600px;
background:#fff;
border-radius:30px 30px 0 0;
padding:26px 20px 40px;
max-height:90vh;
overflow:auto;
}

.editor-title{
font-size:20px;
font-weight:700;
margin-bottom:16px;
}

.input{
width:100%;
border:none;
background:#f4f4f5;
border-radius:18px;
padding:16px;
margin-bottom:12px;
font-size:15px;
}

textarea{min-height:110px;resize:none;}

.submit{
width:100%;
border:none;
background:#9EC4E8;
color:#fff;
border-radius:18px;
padding:16px;
font-weight:700;
cursor:pointer;
margin-top:8px;
}

.add-reply-btn{
width:100%;
margin-top:14px;
border:none;
background:#edf5fc;
color:#5f8fbf;
border-radius:16px;
padding:14px;
font-weight:700;
cursor:pointer;
}

footer{
text-align:center;
margin-top:40px;
color:#9EC4E8;
}
</style>

</head>

<body>

<div class="container">
<div class="feed" id="feed"></div>
</div>

<button class="open-editor" onclick="openFan()">+ 게시물 추가</button>

<!-- FAN -->
<div class="overlay" id="fanOverlay">
<div class="editor">

<div class="editor-title">팬 답글 생성</div>

<input class="input" id="fanName" placeholder="팬 이름"/>
<input class="input" id="fanProfile" placeholder="프로필 URL"/>
<input class="input" id="fanTime" placeholder="시간 직접 입력"/>
<textarea class="input" id="fanContent" placeholder="팬 내용"></textarea>

<hr>

<div class="editor-title">아티스트 답글</div>

<input class="input" id="fanArtistName"/>
<input class="input" id="fanArtistColor"/>
<input class="input" id="fanArtistProfile"/>
<input class="input" id="fanArtistTime"/>
<textarea class="input" id="fanArtistReply"></textarea>

<button class="submit" onclick="addFan()">저장</button>

</div>
</div>

<!-- ARTIST -->
<div class="overlay" id="artistOverlay">
<div class="editor">

<div class="editor-title">아티스트 댓글</div>

<input class="input" id="artistName"/>
<input class="input" id="artistColor"/>
<input class="input" id="artistProfile"/>
<input class="input" id="artistTime"/>
<textarea class="input" id="artistContent"></textarea>

<button class="submit" onclick="addArtist()">저장</button>

</div>
</div>

<!-- Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCScxIFC1-FtX7a9JNFMoNB9yAyhBoneLo",
  authDomain: "weverse-archive.firebaseapp.com",
  projectId: "weverse-archive",
  storageBucket: "weverse-archive.firebasestorage.app",
  messagingSenderId: "81825623806",
  appId: "1:81825623806:web:4a815e85600f0f9de13faf"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* archive 분리 */
const params = new URLSearchParams(location.search);
const archiveId = params.get("archive") || "default";

const ref = db.collection("archives").doc(archiveId);

let posts = [];
const feed = document.getElementById("feed");

/* LOAD */
async function load(){
const doc = await ref.get();
if(doc.exists){
posts = doc.data().posts || [];
}
render();
}

/* SAVE */
async function save(){
await ref.set({posts});
render();
}

/* 인증마크 */
function verify(){
return `
<span class="verify">
<svg viewBox="0 0 24 24">
<path fill="#22D3C5" d="M12 2L14.7 4.1L18 3.8L19.1 7L22 9L20.8 12L22 15L19.1 17L18 20.2L14.7 19.9L12 22L9.3 19.9L6 20.2L4.9 17L2 15L3.2 12L2 9L4.9 7L6 3.8L9.3 4.1L12 2Z"/>
<path fill="#fff" d="M10.2 15.5L6.8 12.1L8 10.9L10.2 13.1L16 7.3L17.2 8.5L10.2 15.5Z"/>
</svg>
</span>`;
}

/* RENDER */
function render(){
feed.innerHTML="";

posts.forEach((p,i)=>{
let html="";

if(p.type==="fan"){
html+=`
<div class="post">
<div class="header">
<div class="left">
<div class="profile"><img src="${p.fanProfile}"></div>
<div>
<div class="name">${p.fanName}</div>
<div class="date">${p.fanTime}</div>
</div>
</div>
</div>

<div class="content">${p.fanContent}</div>

<div class="reply">
<div>아티스트 답글</div>
`;

p.replies.forEach(r=>{
html+=`
<div class="reply">
<div class="name-row">
<div class="name" style="color:${r.artistColor}">
${r.artistName}
</div>
${verify()}
</div>
<div class="date">${r.artistTime}</div>
<div class="content">${r.artistReply}</div>
</div>`;
});

html+=`</div></div>`;
}

if(p.type==="artist"){
html+=`
<div class="post">
<div class="header">
<div class="left">
<div class="profile"><img src="${p.artistProfile}"></div>
<div>
<div class="name-row">
<div class="name" style="color:${p.artistColor}">
${p.artistName}
</div>
${verify()}
</div>
<div class="date">${p.artistTime}</div>
</div>
</div>
</div>

<div class="content">${p.artistContent}</div>
</div>`;
}

feed.innerHTML+=html;
});
}

/* ADD */
async function addFan(){
posts.push({
type:"fan",
fanName:fanName.value,
fanProfile:fanProfile.value,
fanTime:fanTime.value,
fanContent:fanContent.value,
replies:[{
artistName:fanArtistName.value,
artistColor:fanArtistColor.value||"#9EC4E8",
artistProfile:fanArtistProfile.value,
artistTime:fanArtistTime.value,
artistReply:fanArtistReply.value
}]
});

await save();
}

async function addArtist(){
posts.push({
type:"artist",
artistName:artistName.value,
artistColor:artistColor.value||"#9EC4E8",
artistProfile:artistProfile.value,
artistTime:artistTime.value,
artistContent:artistContent.value,
replies:[]
});

await save();
}

/* OPEN */
function openFan(){
document.getElementById("fanOverlay").style.display="flex";
}

/* START */
load();

</script>

</body>
</html>
