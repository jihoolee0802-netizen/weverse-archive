<script type="module">
//////////////////////////////////////////////////
// Firebase import
//////////////////////////////////////////////////

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

//////////////////////////////////////////////////
// Firebase config (너 그대로)
//////////////////////////////////////////////////

const firebaseConfig = {
  apiKey: "AIzaSyCScxIFC1-FtX7a9JNFMoNB9yAyhBoneLo",
  authDomain: "weverse-archive.firebaseapp.com",
  projectId: "weverse-archive",
  storageBucket: "weverse-archive.firebasestorage.app",
  messagingSenderId: "81825623806",
  appId: "1:81825623806:web:4a815e85600f0f9de13faf",
  measurementId: "G-GX6RB28S7D"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

//////////////////////////////////////////////////
// archive 분리 (원본 유지)
//////////////////////////////////////////////////

const params = new URLSearchParams(location.search);
const archiveId = params.get('archive') || 'default';

//////////////////////////////////////////////////
// data (🔥 localStorage 제거 → Firestore)
//////////////////////////////////////////////////

let posts = [];
let currentReplyIndex = null;

const feed = document.getElementById('feed');

//////////////////////////////////////////////////
// 실시간 로딩 (핵심)
//////////////////////////////////////////////////

onSnapshot(
  query(
    collection(db, "archives", archiveId, "posts"),
    orderBy("createdAt", "asc")
  ),
  (snapshot) => {
    posts = snapshot.docs.map(doc => ({
      id: doc.id,
      ...doc.data()
    }));
    renderPosts();
  }
);

//////////////////////////////////////////////////
// Firestore 저장 함수
//////////////////////////////////////////////////

async function saveToFirebase(post) {
  await addDoc(
    collection(db, "archives", archiveId, "posts"),
    {
      ...post,
      createdAt: serverTimestamp()
    }
  );
}

//////////////////////////////////////////////////
// 인증마크 (원본 그대로)
//////////////////////////////////////////////////

function verifyBadge() {
  return `
  <div class="verify">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path fill="#22D3C5"
        d="M12 2L14.7 4.1L18 3.8L19.1 7L22 9L20.8 12L22 15L19.1 17L18 20.2L14.7 19.9L12 22L9.3 19.9L6 20.2L4.9 17L2 15L3.2 12L2 9L4.9 7L6 3.8L9.3 4.1L12 2Z"/>
      <path fill="white"
        d="M10.2 15.5L6.8 12.1L8 10.9L10.2 13.1L16 7.3L17.2 8.5L10.2 15.5Z"/>
    </svg>
  </div>`;
}

//////////////////////////////////////////////////
// render (원본 구조 유지)
//////////////////////////////////////////////////

function renderPosts() {
  feed.innerHTML = '';

  posts.forEach((post, index) => {

    const card = document.createElement('div');
    card.className = 'post';

    let html = '';

    if (post.type === 'fan') {

      html += `
      <div class="header">
        <div class="left">
          <div class="profile">
            <img src="${post.fanProfile}">
          </div>
          <div>
            <div class="name">${post.fanName}</div>
            <div class="date">${post.fanTime}</div>
          </div>
        </div>
      </div>

      <div class="content">${post.fanContent}</div>

      <div class="actions">
        <button class="like">♡</button>
      </div>

      <div class="reply-wrapper">
        <div class="reply-label">아티스트 답글</div>
      `;

      (post.replies || []).forEach(reply => {
        html += renderReply(reply);
      });

      html += `
        <button class="add-reply-btn" onclick="addReplyPrompt(${index})">
          + 아티스트 답글 추가
        </button>
      </div>
      `;
    }

    if (post.type === 'artist') {

      html += `
      <div class="header">
        <div class="left">
          <div class="profile">
            <img src="${post.artistProfile}">
          </div>
          <div>
            <div class="name-row">
              <div class="name" style="color:${post.artistColor}">
                ${post.artistName}
              </div>
              ${verifyBadge()}
            </div>
            <div class="date">${post.artistTime}</div>
          </div>
        </div>
      </div>

      <div class="content">${post.artistContent}</div>

      <div class="actions">
        <button class="like">♡</button>
      </div>

      <div class="reply-wrapper">
        ${post.replies?.length ? '<div class="reply-label">아티스트 답글</div>' : ''}
      `;

      (post.replies || []).forEach(reply => {
        html += renderReply(reply);
      });

      html += `
        <button class="add-reply-btn" onclick="addReplyPrompt(${index})">
          + 아티스트 답글 추가
        </button>
      </div>
      `;
    }

    card.innerHTML = html;
    feed.appendChild(card);
  });

  document.querySelectorAll('.like').forEach(btn => {
    btn.onclick = function () {
      this.classList.toggle('active');
      this.textContent = this.classList.contains('active') ? '♥' : '♡';
    };
  });
}

//////////////////////////////////////////////////
// reply (원본 유지)
//////////////////////////////////////////////////

function renderReply(reply) {
  return `
  <div class="reply">
    <div class="header">
      <div class="left">
        <div class="profile">
          <img src="${reply.artistProfile}">
        </div>
        <div>
          <div class="name-row">
            <div class="name" style="color:${reply.artistColor}">
              ${reply.artistName}
            </div>
            ${verifyBadge()}
          </div>
          <div class="date">${reply.artistTime}</div>
        </div>
      </div>
    </div>

    <div class="content">${reply.artistReply}</div>

    <div class="actions">
      <button class="like">♡</button>
    </div>
  </div>`;
}

//////////////////////////////////////////////////
// open/close (원본 유지)
//////////////////////////////////////////////////

window.openTypeSelector = () => {
  closeAll();
  document.getElementById('typeOverlay').style.display = 'flex';
};

window.openFanPostEditor = () => {
  closeAll();
  document.getElementById('fanOverlay').style.display = 'flex';
};

window.openArtistCommentEditor = () => {
  closeAll();
  document.getElementById('artistOverlay').style.display = 'flex';
};

window.addReplyPrompt = (index) => {
  currentReplyIndex = index;
  closeAll();
  document.getElementById('replyOverlay').style.display = 'flex';
};

function closeAll() {
  document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
}

document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => {
    if (e.target === o) o.style.display = 'none';
  });
});

//////////////////////////////////////////////////
// SAVE (🔥 핵심: Firebase 저장)
//////////////////////////////////////////////////

window.addFanPost = async () => {

  await saveToFirebase({
    type: 'fan',
    fanName: fanName.value,
    fanProfile: fanProfile.value,
    fanTime: fanTime.value,
    fanContent: fanContent.value,
    replies: [{
      artistName: fanArtistName.value,
      artistColor: fanArtistColor.value || '#9EC4E8',
      artistProfile: fanArtistProfile.value,
      artistTime: fanArtistTime.value,
      artistReply: fanArtistReply.value
    }]
  });

  closeAll();
};

window.addArtistComment = async () => {

  await saveToFirebase({
    type: 'artist',
    artistName: artistName.value,
    artistColor: artistColor.value || '#9EC4E8',
    artistProfile: artistProfile.value,
    artistTime: artistTime.value,
    artistContent: artistContent.value,
    replies: []
  });

  closeAll();
};

window.submitReply = async () => {

  const post = posts[currentReplyIndex];

  const newReplies = [
    ...(post.replies || []),
    {
      artistName: replyArtistName.value,
      artistColor: replyArtistColor.value || '#9EC4E8',
      artistProfile: replyArtistProfile.value,
      artistTime: replyArtistTime.value,
      artistReply: replyArtistContent.value
    }
  ];

  await addDoc(
    collection(db, "archives", archiveId, "posts"),
    {
      ...post,
      replies: newReplies,
      createdAt: serverTimestamp()
    }
  );

  closeAll();
};

//////////////////////////////////////////////////
// start
//////////////////////////////////////////////////

renderPosts();

</script>
