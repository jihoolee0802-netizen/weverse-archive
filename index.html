<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weverse Archive</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');

/* ===== 네 CSS 그대로 유지 ===== */

*{box-sizing:border-box;}

body{
margin:0;
padding:24px 16px 120px;
background:#f5f5f7;
font-family:'Pretendard',sans-serif;
color:#111;
}

.container{max-width:560px;margin:auto;}

.feed{display:flex;flex-direction:column;gap:22px;}

.post{
background:white;
border-radius:30px;
padding:24px;
border:1px solid #ececec;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}

.left{display:flex;gap:14px;}

.profile{width:54px;height:54px;border-radius:50%;overflow:hidden;background:#ddd;}

.profile img{width:100%;height:100%;object-fit:cover;}

.name{font-size:18px;font-weight:700;}

.date{font-size:14px;color:#8e8e93;}

.content{font-size:18px;line-height:1.8;}

.like{border:none;background:none;font-size:30px;color:#999;}

.like.active{color:#9EC4E8;}

.open-editor{
position:fixed;bottom:24px;left:50%;
transform:translateX(-50%);
width:calc(100% - 32px);
max-width:560px;
background:#9EC4E8;
color:white;
border:none;
border-radius:22px;
padding:18px;
font-weight:700;
}

.overlay{
position:fixed;inset:0;
background:rgba(0,0,0,0.35);
display:none;
justify-content:center;
align-items:flex-end;
}

.editor{
background:white;
width:100%;
border-radius:30px 30px 0 0;
padding:20px;
}

.input{
width:100%;
padding:14px;
margin-bottom:10px;
border:none;
background:#f4f4f5;
border-radius:12px;
}

.submit{
width:100%;
padding:14px;
background:#9EC4E8;
border:none;
color:white;
font-weight:700;
border-radius:12px;
}
</style>
</head>

<body>

<div class="container">
<div class="feed" id="feed"></div>
</div>

<button class="open-editor" onclick="openEditor()">+ 게시물 추가</button>

<div class="overlay" id="overlay">
<div class="editor">

<input class="input" id="name" placeholder="이름">
<input class="input" id="time" placeholder="시간">
<textarea class="input" id="content" placeholder="내용"></textarea>

<button class="submit" onclick="addPost()">저장</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
getFirestore,
doc,
getDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* ===== FIREBASE CONFIG (그대로 유지) ===== */
const firebaseConfig = {
apiKey: "AIzaSyCScxIFC1-FtX7a9JNFMoNB9yAyhBoneLo",
authDomain: "weverse-archive.firebaseapp.com",
projectId: "weverse-archive",
storageBucket: "weverse-archive.firebasestorage.app",
messagingSenderId: "81825623806",
appId: "1:81825623806:web:4a815e85600f0f9de13faf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===== archive ID (기기별 분리 가능) ===== */
const archiveId = new URLSearchParams(location.search).get("archive") || "default";

/* ===== state ===== */
let posts = [];
const feed = document.getElementById("feed");

/* ===== LOAD ===== */
async function load(){
try{
const ref = doc(db, "weverseArchive", archiveId);
const snap = await getDoc(ref);

if(snap.exists()){
posts = snap.data().posts || [];
}

render();
}catch(e){
console.log("load error", e);
}
}

/* ===== SAVE ===== */
async function save(){
try{
const ref = doc(db, "weverseArchive", archiveId);
await setDoc(ref,{posts});
render();
}catch(e){
console.log("save error", e);
}
}

/* ===== RENDER ===== */
function render(){
feed.innerHTML = "";

posts.forEach(p=>{
const div = document.createElement("div");
div.className="post";
div.innerHTML = `
<div class="header">
<div class="left">
<div class="profile"></div>
<div>
<div class="name">${p.name}</div>
<div class="date">${p.time}</div>
</div>
</div>
</div>
<div class="content">${p.content}</div>
<button class="like">♡</button>
`;

feed.appendChild(div);
});
}

/* ===== ADD ===== */
window.addPost = function(){
posts.push({
name:document.getElementById("name").value,
time:document.getElementById("time").value,
content:document.getElementById("content").value
});

save();
close();
};

window.openEditor = function(){
document.getElementById("overlay").style.display="flex";
};

function close(){
document.getElementById("overlay").style.display="none";
}

/* ===== START ===== */
load();

</script>

</body>
</html>
