<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weverse Archive</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');

/* ================= BASE ================= */
*{box-sizing:border-box;}

body{
margin:0;
padding:24px 16px 120px;
background:#f5f5f7;
font-family:'Pretendard',sans-serif;
color:#111;
}

.container{max-width:560px;margin:auto;}
.feed{display:flex;flex-direction:column;gap:22px;}

/* ================= POST ================= */
.post{
background:#fff;
border-radius:30px;
padding:24px;
border:1px solid #ececec;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.header{display:flex;justify-content:space-between;margin-bottom:16px;}
.left{display:flex;gap:14px;}

.profile{
width:54px;height:54px;border-radius:50%;
overflow:hidden;background:#ddd;
}
.profile img{width:100%;height:100%;object-fit:cover;}

.name{font-size:18px;font-weight:700;}
.date{font-size:14px;color:#8e8e93;margin-top:4px;}

.content{
font-size:18px;
line-height:1.8;
word-break:keep-all;
}

.like{
border:none;
background:none;
font-size:30px;
cursor:pointer;
color:#999;
}
.like.active{color:#9EC4E8;}

/* ================= BUTTON ================= */
.open-editor{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);
width:calc(100% - 32px);
max-width:560px;
border:none;
border-radius:22px;
background:#9EC4E8;
color:white;
font-size:17px;
font-weight:700;
padding:18px;
z-index:999;
}

/* ================= OVERLAY ================= */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.35);
display:none;
justify-content:center;
align-items:flex-end;
z-index:1000;
}

.editor{
width:100%;
max-width:600px;
background:#fff;
border-radius:30px 30px 0 0;
padding:26px 20px 40px;
max-height:90vh;
overflow:auto;
}

.input{
width:100%;
border:none;
background:#f4f4f5;
border-radius:18px;
padding:16px;
margin-bottom:14px;
font-size:16px;
}

.submit{
width:100%;
border:none;
background:#9EC4E8;
color:#fff;
border-radius:18px;
padding:16px;
font-size:17px;
font-weight:700;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "weverse-archive.firebaseapp.com",
projectId: "weverse-archive",
storageBucket: "weverse-archive.appspot.com",
messagingSenderId: "YOUR_ID",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= ARCHIVE SYSTEM ================= */
const archiveId =
new URLSearchParams(location.search).get("archive") || "default";

const DB_NAME = "weverseArchive";
const LOCAL_KEY = "weverse_" + archiveId;

/* ================= STATE ================= */
let posts = [];
const feed = document.getElementById("feed");

/* ================= SAFE RENDER ================= */
function render(){
if(!feed) return;

feed.innerHTML = "";

posts.forEach((p,i)=>{
const div = document.createElement("div");
div.className="post";

div.innerHTML = `
<div class="header">
<div class="left">
<div class="profile">
<img src="${p.profile || ''}">
</div>
<div>
<div class="name">${p.name || ''}</div>
<div class="date">${p.time || ''}</div>
</div>
</div>
</div>

<div class="content">${p.content || ''}</div>

<div class="actions">
<button class="like">♡</button>
</div>
`;

feed.appendChild(div);
});
}

/* ================= SAVE (LOCAL + FIREBASE) ================= */
async function save(){
try{
localStorage.setItem(LOCAL_KEY, JSON.stringify(posts));

await setDoc(doc(db, DB_NAME, archiveId), {
posts,
updatedAt: Date.now()
});
}catch(e){
console.error("SAVE ERROR:", e);
}

render();
}

/* ================= LOAD (LOCAL → FIREBASE MERGE) ================= */
async function load(){
try{

const local = localStorage.getItem(LOCAL_KEY);
if(local) posts = JSON.parse(local);

const snap = await getDoc(doc(db, DB_NAME, archiveId));

if(snap.exists()){
const remote = snap.data().posts || [];

/* merge (중복 방지용 단순 override 구조) */
if(remote.length > posts.length){
posts = remote;
localStorage.setItem(LOCAL_KEY, JSON.stringify(posts));
}
}

}catch(e){
console.error("LOAD ERROR:", e);
}

render();
}

/* ================= ADD POST ================= */
window.addPost = function(){

posts.push({
name:"Weverse User",
content:"hello archive",
time:new Date().toLocaleString(),
profile:""
});

save();
};

/* ================= START ================= */
load();

</script>
</head>

<body>

<div class="container">
<div class="feed" id="feed"></div>
</div>

<button class="open-editor" onclick="addPost()">
+ 게시물 추가
</button>

</body>
</html>
