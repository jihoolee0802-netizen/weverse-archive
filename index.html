<script type="module">

//////////////////////////////////////////////////
// Firebase
//////////////////////////////////////////////////

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
setDoc
} 
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCScxIFC1-FtX7a9JNFMoNB9yAyhBoneLo",
authDomain: "weverse-archive.firebaseapp.com",
projectId: "weverse-archive",
storageBucket: "weverse-archive.firebasestorage.app",
messagingSenderId: "81825623806",
appId: "1:81825623806:web:4a815e85600f0f9de13faf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

//////////////////////////////////////////////////
// archive 분리 시스템
//////////////////////////////////////////////////

const params = new URLSearchParams(location.search);
const archiveId = params.get("archive") || "default";

const DB_NAME = "weverseArchive";
const docRef = doc(db, DB_NAME, archiveId);

//////////////////////////////////////////////////
// state
//////////////////////////////////////////////////

let posts = [];
let currentReplyIndex = null;

const feed = document.getElementById("feed");

//////////////////////////////////////////////////
// 안전 렌더 (흰화면 방지)
//////////////////////////////////////////////////

function renderSafe(){
if(!feed) return;
renderPosts();
}

//////////////////////////////////////////////////
// LOAD
//////////////////////////////////////////////////

async function loadPosts(){

try{

const snap = await getDoc(docRef);

if(snap.exists()){
posts = snap.data().posts || [];
}else{
posts = [];
}

renderSafe();

}catch(e){
console.error(e);
posts = [];
renderSafe();
}

}

//////////////////////////////////////////////////
// SAVE
//////////////////////////////////////////////////

async function save(){

try{

await setDoc(docRef,{
posts: posts
});

renderPosts();

}catch(e){
console.error("SAVE ERROR", e);
alert("저장 실패");
}

}

//////////////////////////////////////////////////
// 인증 배지
//////////////////////////////////////////////////

function verifyBadge(){
return `
<div class="verify">
<svg viewBox="0 0 24 24">
<path fill="#22D3C5" d="M12 2L14.7 4.1L18 3.8L19.1 7L22 9L20.8 12L22 15L19.1 17L18 20.2L14.7 19.9L12 22L9.3 19.9L6 20.2L4.9 17L2 15L3.2 12L2 9L4.9 7L6 3.8L9.3 4.1L12 2Z"/>
<path fill="white" d="M10.2 15.5L6.8 12.1L8 10.9L10.2 13.1L16 7.3L17.2 8.5L10.2 15.5Z"/>
</svg>
</div>
`;
}

//////////////////////////////////////////////////
// RENDER (UI 100% 유지)
//////////////////////////////////////////////////

function renderPosts(){

if(!feed) return;

feed.innerHTML = "";

posts.forEach((post,index)=>{

const card = document.createElement("div");
card.className = "post";

let html = "";

if(post.type === "fan"){

html += `
<div class="header">
<div class="left">
<div class="profile">
<img src="${post.fanProfile || ''}">
</div>
<div>
<div class="name">${post.fanName || ''}</div>
<div class="date">${post.fanTime || ''}</div>
</div>
</div>
</div>

<div class="content">${post.fanContent || ''}</div>

<div class="actions">
<button class="like">♡</button>
</div>

<div class="reply-wrapper">
<div class="reply-label">아티스트 답글</div>
`;

(post.replies || []).forEach(r=>{
html += renderReply(r);
});

html += `
<button class="add-reply-btn" onclick="addReplyPrompt(${index})">
+ 아티스트 답글 추가
</button>
</div>
`;
}

if(post.type === "artist"){

html += `
<div class="header">
<div class="left">
<div class="profile">
<img src="${post.artistProfile || ''}">
</div>
<div>
<div class="name-row">
<div class="name" style="color:${post.artistColor || '#9EC4E8'}">
${post.artistName || ''}
</div>
${verifyBadge()}
</div>
<div class="date">${post.artistTime || ''}</div>
</div>
</div>
</div>

<div class="content">${post.artistContent || ''}</div>

<div class="actions">
<button class="like">♡</button>
</div>

<div class="reply-wrapper">
`;

(post.replies || []).forEach(r=>{
html += renderReply(r);
});

html += `
<button class="add-reply-btn" onclick="addReplyPrompt(${index})">
+ 아티스트 답글 추가
</button>
</div>
`;
}

card.innerHTML = html;
feed.appendChild(card);
});

// like 버튼
document.querySelectorAll(".like").forEach(btn=>{
btn.onclick = function(){
this.classList.toggle("active");
this.textContent = this.classList.contains("active") ? "♥" : "♡";
};
});

}

//////////////////////////////////////////////////
// reply render
//////////////////////////////////////////////////

function renderReply(r){
return `
<div class="reply">
<div class="header">
<div class="left">
<div class="profile">
<img src="${r.artistProfile || ''}">
</div>
<div>
<div class="name-row">
<div class="name" style="color:${r.artistColor || '#9EC4E8'}">
${r.artistName || ''}
</div>
${verifyBadge()}
</div>
<div class="date">${r.artistTime || ''}</div>
</div>
</div>
</div>
<div class="content">${r.artistReply || ''}</div>
<div class="actions">
<button class="like">♡</button>
</div>
</div>
`;
}

//////////////////////////////////////////////////
// UI CONTROL
//////////////////////////////////////////////////

window.openTypeSelector = () => {
closeAll();
document.getElementById("typeOverlay").style.display = "flex";
};

window.openFanPostEditor = () => {
closeAll();
document.getElementById("fanOverlay").style.display = "flex";
};

window.openArtistCommentEditor = () => {
closeAll();
document.getElementById("artistOverlay").style.display = "flex";
};

window.addReplyPrompt = (i) => {
currentReplyIndex = i;
closeAll();
document.getElementById("replyOverlay").style.display = "flex";
};

function closeAll(){
document.querySelectorAll(".overlay").forEach(o=>{
o.style.display = "none";
});
}

//////////////////////////////////////////////////
// SAVE ACTIONS
//////////////////////////////////////////////////

window.addFanPost = async () => {

posts.push({
type:"fan",
fanName: fanName.value,
fanProfile: fanProfile.value,
fanTime: fanTime.value,
fanContent: fanContent.value,
replies:[{
artistName: fanArtistName.value,
artistColor: fanArtistColor.value || "#9EC4E8",
artistProfile: fanArtistProfile.value,
artistTime: fanArtistTime.value,
artistReply: fanArtistReply.value
}]
});

await save();
};

window.addArtistComment = async () => {

posts.push({
type:"artist",
artistName: artistName.value,
artistColor: artistColor.value || "#9EC4E8",
artistProfile: artistProfile.value,
artistTime: artistTime.value,
artistContent: artistContent.value,
replies:[]
});

await save();
};

window.submitReply = async () => {

if(posts[currentReplyIndex]){
posts[currentReplyIndex].replies.push({
artistName: replyArtistName.value,
artistColor: replyArtistColor.value || "#9EC4E8",
artistProfile: replyArtistProfile.value,
artistTime: replyArtistTime.value,
artistReply: replyArtistContent.value
});

await save();
}
};

//////////////////////////////////////////////////
// START
//////////////////////////////////////////////////

loadPosts();

</script>
