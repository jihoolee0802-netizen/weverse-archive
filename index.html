<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Test</title>
</head>

<body>

<h2>Firebase Test</h2>

<button onclick="addTest()">데이터 추가</button>
<div id="feed"></div>

<script type="module">

console.log("🚀 START");

//////////////////////////////////////////////////
// Firebase CDN
//////////////////////////////////////////////////
import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";

import { 
getFirestore,
doc,
getDoc,
setDoc
} 
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

//////////////////////////////////////////////////
// Firebase 설정
//////////////////////////////////////////////////
const firebaseConfig = {
apiKey: "AIzaSyCScxIFC1-FtX7a9JNFMoNB9yAyhBoneLo",
authDomain: "weverse-archive.firebaseapp.com",
projectId: "weverse-archive",
storageBucket: "weverse-archive.appspot.com",
messagingSenderId: "81825623806",
appId: "1:81825623806:web:4a815e85600f0f9de13faf"
};

//////////////////////////////////////////////////
// 초기화
//////////////////////////////////////////////////
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

console.log("🔥 Firebase Ready");

//////////////////////////////////////////////////
// 데이터
//////////////////////////////////////////////////
let posts = [];
const DB_NAME = "weverseArchive";
const DOC_ID = "main";

//////////////////////////////////////////////////
// 불러오기
//////////////////////////////////////////////////
async function loadData(){

try{

const ref = doc(db, DB_NAME, DOC_ID);
const snap = await getDoc(ref);

if(snap.exists()){
posts = snap.data().posts || [];
}

console.log("📥 LOAD:", posts);
render();

}catch(e){
console.error("LOAD ERROR:", e);
}

}

//////////////////////////////////////////////////
// 저장
//////////////////////////////////////////////////
async function saveData(){

try{

const ref = doc(db, DB_NAME, DOC_ID);

await setDoc(ref,{
posts: posts
});

console.log("💾 SAVE OK");

render();

}catch(e){
console.error("SAVE ERROR:", e);
}

}

//////////////////////////////////////////////////
// 테스트 추가
//////////////////////////////////////////////////
window.addTest = function(){

posts.push({
text: "hello firebase",
time: new Date().toISOString()
});

saveData();

};

//////////////////////////////////////////////////
// 화면 출력
//////////////////////////////////////////////////
function render(){

const feed = document.getElementById("feed");
feed.innerHTML = "";

posts.forEach(p=>{

const div = document.createElement("div");
div.style.padding = "10px";
div.style.border = "1px solid #ddd";
div.style.margin = "5px";

div.innerText = JSON.stringify(p);

feed.appendChild(div);

});

}

//////////////////////////////////////////////////
// 시작
//////////////////////////////////////////////////
loadData();

</script>

</body>
</html>
