<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Weverse Archive</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
padding:24px 12px 120px;
background:#f5f5f7;
font-family:'Pretendard',sans-serif;
color:#111;
}

.container{
width:100%;
max-width:680px;
margin:auto;
}

.feed{
display:flex;
flex-direction:column;
gap:22px;
}

.post{
background:white;
border-radius:30px;
padding:24px;
border:1px solid #ececec;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
overflow:hidden;
}

.header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:16px;
}

.left{
display:flex;
gap:14px;
min-width:0;
}

.profile{
width:54px;
height:54px;
border-radius:50%;
overflow:hidden;
background:#ddd;
flex-shrink:0;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.name-row{
display:flex;
align-items:center;
gap:4px;
flex-wrap:wrap;
}

.name{
font-size:18px;
font-weight:700;
word-break:break-word;
}

.date{
margin-top:4px;
font-size:14px;
color:#8e8e93;
}

.verify{
display:flex;
align-items:center;
justify-content:center;
width:18px;
height:18px;
flex-shrink:0;
}

.verify svg{
width:18px;
height:18px;
display:block;
}

.content{
font-size:18px;
line-height:1.8;
word-break:break-word;
white-space:pre-wrap;
overflow-wrap:anywhere;
}

.actions{
margin-top:18px;
}

.like{
border:none;
background:none;
font-size:30px;
cursor:pointer;
color:#999;
padding:0;
}

.like.active{
color:#9EC4E8;
}

.reply-wrapper{
margin-top:28px;
}

.reply-label{
font-size:17px;
font-weight:700;
margin-bottom:18px;
}

.reply{
margin-left:20px;
padding-left:18px;
border-left:3px solid #e5e5e5;
margin-bottom:26px;
overflow:hidden;
}

.open-editor{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);

width:calc(100% - 24px);
max-width:680px;

border:none;
border-radius:22px;

background:#9EC4E8;
color:white;

font-size:17px;
font-weight:700;

padding:18px;

cursor:pointer;

box-shadow:
0 8px 24px rgba(158,196,232,0.35);

z-index:999;
}

.overlay{
position:fixed;
inset:0;

background:rgba(0,0,0,0.35);

display:none;
justify-content:center;
align-items:flex-end;

z-index:1000;
}

.editor{
width:100%;
max-width:680px;

background:white;

border-radius:30px 30px 0 0;

padding:26px 20px 40px;

max-height:90vh;
overflow:auto;
}

.editor-title{
font-size:25px;
font-weight:700;
margin-bottom:20px;
}

.input{
width:100%;
border:none;
background:#f4f4f5;

border-radius:18px;

padding:16px;
margin-bottom:14px;

font-size:16px;
font-family:'Pretendard',sans-serif;
color:#111;
}

textarea{
resize:none;
min-height:110px;
}

.submit{
width:100%;
border:none;

background:#9EC4E8;
color:white;

border-radius:18px;

padding:16px;

font-size:17px;
font-weight:700;

cursor:pointer;
}

.complete-btn{
width:100%;
border:none;

background:#e9eef5;
color:#6b7480;

border-radius:18px;

padding:16px;

font-size:16px;
font-weight:700;

cursor:pointer;

margin-top:12px;
}

.add-reply-btn{
width:100%;
margin-top:14px;

border:none;
background:#edf5fc;

color:#5f8fbf;

border-radius:16px;

padding:14px;

font-size:15px;
font-weight:700;

cursor:pointer;
}

footer{
text-align:center;
margin-top:40px;
color:#9EC4E8;
font-size:15px;
}

@media (max-width:600px){

body{
padding:18px 10px 120px;
}

.post{
padding:20px;
border-radius:24px;
}

.content{
font-size:17px;
}

}

</style>

</head>

<body>

<div class="container">
<div class="feed" id="feed"></div>
</div>

<button
class="open-editor"
onclick="openTypeSelector()"
>
+ 게시물 추가
</button>

<!-- 기존 HTML 전부 그대로 유지 -->

<footer>
made with love ♡
</footer>

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

//////////////////////////////////////////////////
// firebase
//////////////////////////////////////////////////

const firebaseConfig = {

apiKey: "AIzaSyCScxIFC1-FtX7a9JNFMoNB9yAyhBoneLo",
authDomain: "weverse-archive.firebaseapp.com",
projectId: "weverse-archive",
storageBucket: "weverse-archive.firebasestorage.app",
messagingSenderId: "81825623806",
appId: "1:81825623806:web:4a815e85600f0f9de13faf",
measurementId: "G-GX6RB28S7D"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

//////////////////////////////////////////////////
// archive
//////////////////////////////////////////////////

const params =
new URLSearchParams(location.search);

const archiveId =
params.get('archive') || 'default';

//////////////////////////////////////////////////
// data
//////////////////////////////////////////////////

let posts = [];

let currentReplyIndex = null;

const feed =
document.getElementById('feed');

//////////////////////////////////////////////////
// realtime sync
//////////////////////////////////////////////////

db.collection("archives")
.doc(archiveId)
.collection("posts")
.orderBy("createdAt","asc")
.onSnapshot(snapshot=>{

posts = snapshot.docs.map(doc=>({

id: doc.id,
...doc.data()

}));

renderPosts();

});

//////////////////////////////////////////////////
// 인증마크
//////////////////////////////////////////////////

function verifyBadge(){

return `

<div class="verify">

<svg
viewBox="0 0 24 24"
xmlns="http://www.w3.org/2000/svg"
>

<path
fill="#22D3C5"
d="M12 2L14.7 4.1L18 3.8L19.1 7L22 9L20.8 12L22 15L19.1 17L18 20.2L14.7 19.9L12 22L9.3 19.9L6 20.2L4.9 17L2 15L3.2 12L2 9L4.9 7L6 3.8L9.3 4.1L12 2Z"
/>

<path
fill="white"
d="M10.2 15.5L6.8 12.1L8 10.9L10.2 13.1L16 7.3L17.2 8.5L10.2 15.5Z"
/>

</svg>

</div>

`;

}

//////////////////////////////////////////////////
// render
//////////////////////////////////////////////////

function renderPosts(){

feed.innerHTML = '';

posts.forEach((post,index)=>{

const card =
document.createElement('div');

card.className = 'post';

let html = '';

if(post.type === 'artist'){

html += `

<div class="header">

<div class="left">

<div class="profile">
<img src="${post.artistProfile || ''}">
</div>

<div>

<div class="name-row">

<div
class="name"
style="color:${post.artistColor || '#9EC4E8'}"
>
${post.artistName || ''}
</div>

${verifyBadge()}

</div>

<div class="date">
${post.artistTime || ''}
</div>

</div>

</div>

</div>

<div class="content">
${post.artistContent || ''}
</div>

`;

}

card.innerHTML = html;

feed.appendChild(card);

});

}

//////////////////////////////////////////////////
// open / close
//////////////////////////////////////////////////

function openTypeSelector(){

document.getElementById('typeOverlay')
.style.display = 'flex';

}

function closeAll(){

document.querySelectorAll('.overlay')
.forEach(overlay=>{

overlay.style.display = 'none';

});

}

//////////////////////////////////////////////////
// add artist
//////////////////////////////////////////////////

async function addArtistComment(){

await db
.collection("archives")
.doc(archiveId)
.collection("posts")
.add({

type:'artist',

artistName:
document.getElementById('artistName').value,

artistColor:
document.getElementById('artistColor').value
|| '#9EC4E8',

artistProfile:
document.getElementById('artistProfile').value,

artistTime:
document.getElementById('artistTime').value,

artistContent:
document.getElementById('artistContent').value,

completed:false,

replies:[],

createdAt: Date.now()

});

closeAll();

}

</script>

</body>
</html>
