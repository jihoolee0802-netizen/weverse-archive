<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weverse Archive</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');

*{
box-sizing:border-box;
}

body{
margin:0;
padding:24px 16px 120px;
background:#f5f5f7;
font-family:'Pretendard',sans-serif;
color:#111;
}

.container{
max-width:560px;
margin:auto;
}

.feed{
display:flex;
flex-direction:column;
gap:22px;
}

.post{
background:white;
border-radius:30px;
padding:24px;
border:1px solid #ececec;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:16px;
}

.left{
display:flex;
gap:14px;
}

.profile{
width:54px;
height:54px;
border-radius:50%;
overflow:hidden;
background:#ddd;
flex-shrink:0;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

.name-row{
display:flex;
align-items:center;
gap:4px;
flex-wrap:wrap;
}

.name{
font-size:18px;
font-weight:700;
}

.date{
margin-top:4px;
font-size:14px;
color:#8e8e93;
}

.verify{
display:flex;
align-items:center;
justify-content:center;
width:18px;
height:18px;
}

.verify svg{
width:18px;
height:18px;
}

.content{
font-size:18px;
line-height:1.8;
word-break:keep-all;
}

.actions{
margin-top:18px;
}

.like{
border:none;
background:none;
font-size:30px;
cursor:pointer;
color:#999;
}

.like.active{
color:#9EC4E8;
}

.open-editor{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);
width:calc(100% - 32px);
max-width:560px;
border:none;
border-radius:22px;
background:#9EC4E8;
color:white;
font-size:17px;
font-weight:700;
padding:18px;
cursor:pointer;
box-shadow:0 8px 24px rgba(158,196,232,0.35);
z-index:999;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.35);
display:none;
justify-content:center;
align-items:flex-end;
z-index:1000;
}

.editor{
width:100%;
max-width:600px;
background:white;
border-radius:30px 30px 0 0;
padding:26px 20px 40px;
max-height:90vh;
overflow:auto;
}

.input{
width:100%;
border:none;
background:#f4f4f5;
border-radius:18px;
padding:16px;
margin-bottom:14px;
font-size:16px;
font-family:'Pretendard',sans-serif;
}

textarea{
resize:none;
min-height:110px;
}

.submit{
width:100%;
border:none;
background:#9EC4E8;
color:white;
border-radius:18px;
padding:16px;
font-size:17px;
font-weight:700;
cursor:pointer;
}

.add-reply-btn{
width:100%;
margin-top:14px;
border:none;
background:#edf5fc;
color:#5f8fbf;
border-radius:16px;
padding:14px;
font-size:15px;
font-weight:700;
cursor:pointer;
}

footer{
text-align:center;
margin-top:40px;
color:#9EC4E8;
font-size:15px;
}

</style>

</head>

<body>

<div class="container">

<div class="feed" id="feed"></div>

<button
class="add-reply-btn"
onclick="resetArchive()"
style="margin-top:40px;background:#fff;border:1px solid #d6e7f7;color:#7aa7d1;"
>
+ 새 아카이브 만들기
</button>

</div>

<button class="open-editor" onclick="openTypeSelector()">
+ 게시물 추가
</button>

<!-- overlays (원본 그대로 유지) -->

<div class="overlay" id="typeOverlay">
<div class="editor">
<div class="editor-title">무엇을 추가할까?</div>
<button class="submit" onclick="openFanPostEditor()">팬 답글</button>
<button class="submit" onclick="openArtistCommentEditor()">아티스트 댓글</button>
</div>
</div>

<div class="overlay" id="fanOverlay">
<div class="editor">
<div class="editor-title">팬 답글 생성</div>

<input class="input" id="fanName" placeholder="팬 이름 / 팬덤명">
<input class="input" id="fanProfile" placeholder="팬 프로필 사진 URL">
<input class="input" id="fanTime" placeholder="팬 작성 시간">
<textarea class="input" id="fanContent" placeholder="팬 질문 입력"></textarea>

<hr style="margin:24px 0;border:none;border-top:1px solid #eee;">

<div style="font-weight:700;margin-bottom:14px;">아티스트 답글</div>

<input class="input" id="fanArtistName" placeholder="아티스트 이름">
<input class="input" id="fanArtistColor" placeholder="색상">
<input class="input" id="fanArtistProfile" placeholder="사진 URL">
<input class="input" id="fanArtistTime" placeholder="시간">
<textarea class="input" id="fanArtistReply" placeholder="답글"></textarea>

<button class="submit" onclick="addFanPost()">저장하기</button>
</div>
</div>

<div class="overlay" id="artistOverlay">
<div class="editor">
<div class="editor-title">아티스트 댓글 생성</div>

<input class="input" id="artistName">
<input class="input" id="artistColor">
<input class="input" id="artistProfile">
<input class="input" id="artistTime">
<textarea class="input" id="artistContent"></textarea>

<button class="submit" onclick="addArtistComment()">저장하기</button>
</div>
</div>

<div class="overlay" id="replyOverlay">
<div class="editor">
<div class="editor-title">아티스트 답글 추가</div>

<input class="input" id="replyArtistName">
<input class="input" id="replyArtistColor">
<input class="input" id="replyArtistProfile">
<input class="input" id="replyArtistTime">
<textarea class="input" id="replyArtistContent"></textarea>

<button class="submit" onclick="submitReply()">답글 저장</button>
</div>
</div>

<footer>made with love ♡</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

/* ================= Firebase ================= */

const firebaseConfig = {
  apiKey: "AIzaSyCScxIFC1-FtX7a9JNFMoNB9yAyhBoneLo",
  authDomain: "weverse-archive.firebaseapp.com",
  projectId: "weverse-archive",
  storageBucket: "weverse-archive.appspot.com",
  messagingSenderId: "81825623806",
  appId: "1:81825623806:web:4a815e85600f0f9de13faf"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ================= archive ================= */

const params = new URLSearchParams(location.search);
const STORAGE_KEY = params.get('archive') || 'default';

/* ================= data ================= */

let posts = [];
let currentReplyIndex = null;
const feed = document.getElementById('feed');

/* ================= LOAD ================= */

function loadPosts(){

db.collection("archives")
.doc(STORAGE_KEY)
.collection("posts")
.orderBy("createdAt")
.onSnapshot(snapshot=>{

posts = [];

snapshot.forEach(doc=>{
posts.push({id:doc.id,...doc.data()});
});

renderPosts();

});

}

loadPosts();

/* ================= SAVE ================= */

function save(post){

db.collection("archives")
.doc(STORAGE_KEY)
.collection("posts")
.add({
...post,
createdAt: firebase.firestore.FieldValue.serverTimestamp()
});

}

/* ================= VERIFY ================= */

function verifyBadge(){

return `
<div class="verify">
<svg viewBox="0 0 24 24">
<path fill="#22D3C5"
d="M12 2L14.7 4.1L18 3.8L19.1 7L22 9L20.8 12L22 15L19.1 17L18 20.2L14.7 19.9L12 22L9.3 19.9L6 20.2L4.9 17L2 15L3.2 12L2 9L4.9 7L6 3.8L9.3 4.1L12 2Z"/>
<path fill="white"
d="M10.2 15.5L6.8 12.1L8 10.9L10.2 13.1L16 7.3L17.2 8.5L10.2 15.5Z"/>
</svg>
</div>`;
}

/* ================= RENDER ================= */

function renderPosts(){

feed.innerHTML='';

posts.forEach((post,index)=>{

const card=document.createElement('div');
card.className='post';

let html='';

if(post.type==='fan'){

html+=`
<div class="header">
<div class="left">
<div class="profile"><img src="${post.fanProfile}"></div>
<div>
<div class="name">${post.fanName}</div>
<div class="date">${post.fanTime}</div>
</div>
</div>
</div>

<div class="content">${post.fanContent}</div>
<div class="actions"><button class="like">♡</button></div>
<div class="reply-wrapper">
`;

(post.replies||[]).forEach(r=>html+=renderReply(r));

html+=`
<button class="add-reply-btn" onclick="addReplyPrompt(${index})">+ 답글</button>
</div>`;
}

if(post.type==='artist'){

html+=`
<div class="header">
<div class="left">
<div class="profile"><img src="${post.artistProfile}"></div>
<div>
<div class="name-row">
<div class="name" style="color:${post.artistColor}">
${post.artistName}
</div>
${verifyBadge()}
</div>
<div class="date">${post.artistTime}</div>
</div>
</div>
</div>

<div class="content">${post.artistContent}</div>
<div class="actions"><button class="like">♡</button></div>
<div class="reply-wrapper">
`;

(post.replies||[]).forEach(r=>html+=renderReply(r));

html+=`
<button class="add-reply-btn" onclick="addReplyPrompt(${index})">+ 답글</button>
</div>`;
}

card.innerHTML=html;
feed.appendChild(card);

});

document.querySelectorAll('.like').forEach(btn=>{
btn.onclick=()=>{
btn.classList.toggle('active');
btn.textContent=btn.classList.contains('active')?'♥':'♡';
};
});

}

/* ================= REPLY ================= */

function renderReply(r){

return `
<div class="reply">
<div class="header">
<div class="left">
<div class="profile"><img src="${r.artistProfile}"></div>
<div>
<div class="name-row">
<div class="name" style="color:${r.artistColor}">
${r.artistName}
</div>
${verifyBadge()}
</div>
<div class="date">${r.artistTime}</div>
</div>
</div>
</div>

<div class="content">${r.artistReply}</div>
<div class="actions"><button class="like">♡</button></div>
</div>`;
}

/* ================= UI ================= */

function openTypeSelector(){
document.querySelectorAll('.overlay').forEach(o=>o.style.display='flex');
}

function openFanPostEditor(){
document.querySelectorAll('.overlay').forEach(o=>o.style.display='flex');
}

function openArtistCommentEditor(){
document.querySelectorAll('.overlay').forEach(o=>o.style.display='flex');
}

function addReplyPrompt(i){
currentReplyIndex=i;
document.querySelectorAll('.overlay').forEach(o=>o.style.display='flex');
}

/* ================= ADD ================= */

function addFanPost(){

save({
type:'fan',
fanName:fanName.value,
fanProfile:fanProfile.value,
fanTime:fanTime.value,
fanContent:fanContent.value,
replies:[{
artistName:fanArtistName.value,
artistColor:fanArtistColor.value||'#9EC4E8',
artistProfile:fanArtistProfile.value,
artistTime:fanArtistTime.value,
artistReply:fanArtistReply.value
}]
});

}

function addArtistComment(){

save({
type:'artist',
artistName:artistName.value,
artistColor:artistColor.value||'#9EC4E8',
artistProfile:artistProfile.value,
artistTime:artistTime.value,
artistContent:artistContent.value,
replies:[]
});

}

/* ================= REPLY SAVE ================= */

function submitReply(){

const post=posts[currentReplyIndex];

db.collection("archives")
.doc(STORAGE_KEY)
.collection("posts")
.doc(post.id)
.update({
replies:firebase.firestore.FieldValue.arrayUnion({
artistName:replyArtistName.value,
artistColor:replyArtistColor.value||'#9EC4E8',
artistProfile:replyArtistProfile.value,
artistTime:replyArtistTime.value,
artistReply:replyArtistContent.value
})
});

}

/* ================= START ================= */

loadPosts();

</script>

</body>
</html>
